<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Банные печи — заказы в Telegram</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Georgia',serif;background:linear-gradient(135deg,#2c1810,#8b4513);padding:20px;min-height:100vh;}
        h1{text-align:center;color:#ffd700;margin-bottom:10px;font-size:2em;}
        .subtitle{text-align:center;color:#ffecb3;margin-bottom:30px;}

        .dropdown-container{max-width:500px;margin:0 auto 20px;position:relative;}
        .dropdown-btn{width:100%;padding:15px;background:#d35400;color:white;border:none;border-radius:50px;font-size:18px;cursor:pointer;}
        .dropdown-content{display:none;position:absolute;top:100%;left:0;right:0;background:white;border-radius:15px;max-height:300px;overflow-y:auto;border:2px solid #d35400;z-index:100;}
        .dropdown-content.show{display:block;}
        .dropdown-item{padding:12px 15px;cursor:pointer;border-bottom:1px solid #eee;}
        .dropdown-item:hover{background:#fde7e0;}
        .dropdown-item h4{color:#d35400;}
        .dropdown-item p{font-size:12px;color:#666;}
        .dropdown-item .price-drop{color:#c0392b;font-weight:bold;}

        .pechka-card{background:white;border-radius:20px;padding:20px;max-width:500px;margin:20px auto;border:2px solid #d35400;display:none;}
        .pechka-card.show{display:block;}
        .pechka-card img{width:100%;border-radius:15px;height:250px;object-fit:cover;}
        .pechka-card h2{color:#d35400;margin:10px 0;text-align:center;}
        .pechka-card .price{font-size:24px;font-weight:bold;color:#c0392b;text-align:center;margin:10px 0;}
        .pechka-card .specs{background:#fff8f0;padding:10px;border-radius:10px;border-left:4px solid #d35400;margin:10px 0;line-height:1.5;}
        .add-to-cart{width:100%;padding:12px;background:#d35400;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;}

        .cart-section{background:white;border-radius:20px;padding:20px;max-width:500px;margin:30px auto;}
        .cart-section h2{color:#d35400;text-align:center;margin-bottom:10px;}
        .cart-item{background:#fff9f0;padding:10px;border-radius:10px;display:flex;justify-content:space-between;margin-bottom:8px;}
        .remove-item{background:#c0392b;color:white;border:none;border-radius:20px;padding:3px 10px;cursor:pointer;}
        .total{text-align:right;font-size:18px;font-weight:bold;padding-top:10px;border-top:1px solid #d35400;}
        .empty-cart{text-align:center;color:#999;padding:15px;}

        .order-form{margin-top:15px;padding:15px;background:#fff8f0;border-radius:15px;}
        .order-form h3{color:#d35400;text-align:center;margin-bottom:10px;}
        .order-form input{width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:8px;}
        .order-form textarea{width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:8px;}
        .send-btn{width:100%;padding:10px;background:#27ae60;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;}

        .success-msg{position:fixed;top:20px;right:20px;background:#27ae60;color:white;padding:10px 20px;border-radius:10px;z-index:1000;animation:fadeOut 3s forwards;}
        @keyframes fadeOut{0%{opacity:1;}70%{opacity:1;}100%{opacity:0;visibility:hidden;}}
    </style>
</head>
<body>

<h1>🔥 Печи для бани и сауны 🔥</h1>
<div class="subtitle">Каменные печи от производителя — доставка по России</div>

<div class="dropdown-container">
    <button class="dropdown-btn" id="dropdownBtn">📋 Выберите банную печь ▼</button>
    <div class="dropdown-content" id="dropdownContent"></div>
</div>

<div id="pechkaCard" class="pechka-card">
    <img id="cardImage" src="" alt="Печь">
    <h2 id="cardName"></h2>
    <div class="specs" id="cardSpecs"></div>
    <div class="price" id="cardPrice"></div>
    <button class="add-to-cart" id="addToCartBtn">🛒 В корзину</button>
</div>

<div class="cart-section">
    <h2>🛍️ Корзина</h2>
    <div id="cartItems"><div class="empty-cart">Корзина пуста</div></div>
    <div class="total">💰 Итого: <span id="totalSum">0</span> ₽</div>
    <div class="order-form" id="orderForm" style="display:none;">
        <h3>📝 Оформление заказа</h3>
        <input type="text" id="customerName" placeholder="Ваше имя *">
        <input type="email" id="customerEmail" placeholder="Email *">
        <input type="tel" id="customerPhone" placeholder="Телефон *">
        <textarea id="customerAddress" placeholder="Адрес доставки" rows="2"></textarea>
        <button class="send-btn" id="sendOrderBtn">📨 Отправить заказ в Telegram</button>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ TELEGRAM ==========
    const BOT_TOKEN = "8765410107:AAGkrWF4g0XzQzdUyYAOcX7DS019zGjmSBA";
    const CHAT_ID = "2013568102";

    // ========== 20 ПЕЧЕЙ ИЗ ТАБЛИЦЫ ==========
    const pechki = [
        {id:1, name:"Печь Ø325 сквозная каменка, без бака", price:14000, specs:"🏠 Объем бани до 15 м³ (6 м²)<br>📐 500×400×700 мм<br>🔥 Толщина 8 мм<br>🪵 Колосник чугунный", img:"https://placehold.co/600x400/d35400/white?text=Печь+325"},
        {id:2, name:"Печь Ø325 сквозная каменка + бак чёрный", price:18500, specs:"🏠 Объем бани до 15 м³<br>📐 500×400×700 + бак<br>💧 Бак 65 л, сталь 2 мм", img:"https://placehold.co/600x400/e67e22/white?text=Печь+325+бак"},
        {id:3, name:"Печь Ø325 сквозная каменка + бак нерж", price:24000, specs:"🏠 Объем бани до 15 м³<br>💧 Бак нержавейка 65 л", img:"https://placehold.co/600x400/27ae60/white?text=Печь+325+нерж"},
        {id:4, name:"Печь Ø426 лежачая, без бака", price:16500, specs:"🏠 Объем бани до 25 м³ (9 м²)<br>📐 650×450×600 мм<br>🔥 Толщина 8 мм, конвекция", img:"https://placehold.co/600x400/3498db/white?text=Печь+426+леж"},
        {id:5, name:"Печь Ø426 лежачая + чёрный бак", price:21000, specs:"🏠 Объем бани до 25 м³<br>💧 Бак 65 л, сталь 2 мм", img:"https://placehold.co/600x400/1abc9c/white?text=426+леж+бак"},
        {id:6, name:"Печь Ø426 лежачая + бак нерж", price:26500, specs:"🏠 Объем бани до 25 м³<br>💧 Бак нержавейка 65 л", img:"https://placehold.co/600x400/9b59b6/white?text=426+леж+нерж"},
        {id:7, name:"Печь Ø426 открытая каменка, без бака", price:12000, specs:"🏠 Объем бани до 15 м³ (6 м²)<br>📐 426×550 мм", img:"https://placehold.co/600x400/c0392b/white?text=426+откр"},
        {id:8, name:"Печь Ø426 открытая каменка + чёрный бак", price:16500, specs:"💧 Бак 65 л, сталь 2 мм", img:"https://placehold.co/600x400/f39c12/white?text=426+откр+бак"},
        {id:9, name:"Печь Ø426 открытая каменка + бак нерж", price:22000, specs:"💧 Бак нержавейка 65 л", img:"https://placehold.co/600x400/2ecc71/white?text=426+откр+нерж"},
        {id:10, name:"Печь Ø530 поворотная каменка, без бака", price:21500, specs:"🏠 Объем бани до 35 м³ (12 м²)<br>📐 550×750×800 мм", img:"https://placehold.co/600x400/e74c3c/white?text=530+поворт"},
        {id:11, name:"Печь Ø530 поворотная + чёрный бак", price:26500, specs:"💧 Бак 85 л, сталь 2 мм", img:"https://placehold.co/600x400/16a085/white?text=530+поворт+бак"},
        {id:12, name:"Печь Ø530 поворотная + бак нерж", price:32500, specs:"💧 Бак нержавейка 85 л", img:"https://placehold.co/600x400/8e44ad/white?text=530+поворт+нерж"},
        {id:13, name:"Печь социальная, без выступа", price:14000, specs:"🏠 Объем бани 15 м³ (6 м²)<br>📐 530×600×500 мм", img:"https://placehold.co/600x400/d35400/white?text=Соц+печь"},
        {id:14, name:"Печь социальная + чёрный бак", price:19500, specs:"💧 Бак 50 л", img:"https://placehold.co/600x400/e67e22/white?text=Соц+чёрн"},
        {id:15, name:"Печь социальная + бак нерж", price:24000, specs:"💧 Бак нержавейка 50 л", img:"https://placehold.co/600x400/27ae60/white?text=Соц+нерж"},
        {id:16, name:"Печь на 2-3 помещения + чёрный бак", price:38000, specs:"🏠 Объем парилки до 20 м³<br>💧 Бак 75 л", img:"https://placehold.co/600x400/2980b9/white?text=3+помещ"},
        {id:17, name:"Печь на 2-3 помещения + бак нерж", price:45000, specs:"💧 Бак нержавейка 75 л", img:"https://placehold.co/600x400/8e44ad/white?text=3+пом+нерж"},
        {id:18, name:"Печь Буржуйка №1", price:5000, specs:"🏠 Объем до 20 м³<br>📐 350×300×300 мм", img:"https://placehold.co/600x400/7f8c8d/white?text=Буржуйка+1"},
        {id:19, name:"Печь Буржуйка №2", price:8000, specs:"🏠 Объем до 40 м³<br>📐 500×350×440 мм", img:"https://placehold.co/600x400/95a5a6/white?text=Буржуйка+2"},
        {id:20, name:"Печь Буржуйка из трубы Ø530", price:16000, specs:"🏠 Объем до 200 м³<br>🔥 Труба 8 мм, чугунный колосник", img:"https://placehold.co/600x400/bdc3c7/white?text=Буржуйка+530"}
    ];

    let cart = [];
    let currentPechka = null;

    function showMessage(text, isError = false) {
        let msg = document.createElement('div');
        msg.className = 'success-msg';
        msg.style.background = isError ? '#c0392b' : '#27ae60';
        msg.textContent = text;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 3000);
    }

    function loadDropdown() {
        let html = '';
        for(let i=0; i<pechki.length; i++) {
            html += `<div class="dropdown-item" onclick="selectPechka(${pechki[i].id})">
                        <h4>🔥 ${pechki[i].name}</h4>
                        <p>${pechki[i].specs.split('<br>')[0]}</p>
                        <div class="price-drop">💰 ${pechki[i].price.toLocaleString('ru-RU')} ₽</div>
                     </div>`;
        }
        document.getElementById('dropdownContent').innerHTML = html;
    }

    function selectPechka(id) {
        currentPechka = pechki.find(p => p.id === id);
        let card = document.getElementById('pechkaCard');
        document.getElementById('cardImage').src = currentPechka.img;
        document.getElementById('cardName').innerHTML = currentPechka.name;
        document.getElementById('cardSpecs').innerHTML = currentPechka.specs;
        document.getElementById('cardPrice').innerHTML = `💰 ${currentPechka.price.toLocaleString('ru-RU')} ₽`;
        card.classList.add('show');
        document.getElementById('dropdownContent').classList.remove('show');
    }

    function updateCartDisplay() {
        let container = document.getElementById('cartItems');
        let totalSpan = document.getElementById('totalSum');
        if(cart.length === 0) {
            container.innerHTML = '<div class="empty-cart">Корзина пуста</div>';
            totalSpan.innerHTML = '0';
            document.getElementById('orderForm').style.display = 'none';
            return;
        }
        let total = 0, html = '';
        for(let i=0; i<cart.length; i++) {
            html += `<div class="cart-item">
                        <span><strong>${cart[i].name}</strong> - ${cart[i].price.toLocaleString('ru-RU')} ₽</span>
                        <button class="remove-item" onclick="removeFromCart(${i})">Удалить</button>
                     </div>`;
            total += cart[i].price;
        }
        container.innerHTML = html;
        totalSpan.innerHTML = total.toLocaleString('ru-RU');
        document.getElementById('orderForm').style.display = 'block';
    }

    function removeFromCart(index) {
        cart.splice(index,1);
        updateCartDisplay();
    }

    function addToCart() {
        if(currentPechka) {
            cart.push({...currentPechka});
            updateCartDisplay();
            showMessage(`✓ ${currentPechka.name} добавлена в корзину!`);
        } else {
            showMessage('❌ Сначала выберите печь');
        }
    }

    // ========== ОТПРАВКА В TELEGRAM ==========
    async function sendOrder() {
        let name = document.getElementById('customerName').value.trim();
        let email = document.getElementById('customerEmail').value.trim();
        let phone = document.getElementById('customerPhone').value.trim();
        let address = document.getElementById('customerAddress').value;

        if(!name || !email || !phone) {
            showMessage('❌ Заполните имя, email и телефон', true);
            return;
        }
        if(cart.length === 0) {
            showMessage('❌ Корзина пуста', true);
            return;
        }

        let items = '';
        let total = 0;
        for(let i=0; i<cart.length; i++) {
            items += `${cart[i].name} — ${cart[i].price.toLocaleString('ru-RU')} ₽\n`;
            total += cart[i].price;
        }

        let message = `🔥 НОВЫЙ ЗАКАЗ! 🔥\n\n👤 Имя: ${name}\n📧 Email: ${email}\n📞 Телефон: ${phone}\n🏠 Адрес: ${address || 'не указан'}\n\n📦 Заказ:\n${items}\n💰 ИТОГО: ${total.toLocaleString('ru-RU')} ₽`;

        try {
            let response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message })
            });
            let result = await response.json();
            if(result.ok) {
                showMessage('✅ Заказ отправлен в Telegram! Мы свяжемся с вами');
                cart = [];
                updateCartDisplay();
                document.getElementById('customerName').value = '';
                document.getElementById('customerEmail').value = '';
                document.getElementById('customerPhone').value = '';
                document.getElementById('customerAddress').value = '';
            } else {
                showMessage('⚠️ Ошибка, но заказ сохранён. Свяжитесь с нами', true);
            }
        } catch(e) {
            showMessage('⚠️ Ошибка соединения. Проверьте интернет или VPN', true);
        }
    }

    document.getElementById('dropdownBtn').onclick = () => {
        document.getElementById('dropdownContent').classList.toggle('show');
    };
    document.getElementById('addToCartBtn').onclick = addToCart;
    document.getElementById('sendOrderBtn').onclick = sendOrder;

    document.onclick = (e) => {
        if(!e.target.closest('.dropdown-container'))
            document.getElementById('dropdownContent').classList.remove('show');
    };

    loadDropdown();
</script>
</body>
</html>
