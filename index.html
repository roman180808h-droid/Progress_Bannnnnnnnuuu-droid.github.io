<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Банные печи — допы работают отлично</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5ede2;
            font-family: 'Segoe UI', 'Georgia', 'Times New Roman', serif;
            padding: 30px 20px;
            color: #2b2a27;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 450;
            text-align: center;
            color: #b45a2b;
            border-bottom: 2px solid #e2cfbc;
            display: inline-block;
            width: auto;
            margin: 0 auto 20px auto;
            padding-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #7e6856;
            font-size: 1rem;
            margin-top: -8px;
            margin-bottom: 40px;
            font-style: italic;
        }

        .dropdown-container {
            max-width: 560px;
            margin: 0 auto 35px;
            position: relative;
        }

        .dropdown-btn {
            width: 100%;
            background: #ffffff;
            border: 1px solid #dccdbd;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-family: inherit;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.2s;
            color: #3f2e1f;
        }

        .dropdown-btn:hover {
            background: #fff7ef;
            border-color: #c48a5c;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2cfbc;
            border-radius: 24px;
            max-height: 340px;
            overflow-y: auto;
            z-index: 90;
            margin-top: 8px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
        }

        .dropdown-content.show {
            display: block;
        }

        .dropdown-item {
            padding: 14px 18px;
            border-bottom: 1px solid #efe2d4;
            cursor: pointer;
            transition: background 0.1s;
        }

        .dropdown-item:hover {
            background: #fef3e9;
        }

        .dropdown-item h4 {
            color: #a55826;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .dropdown-item p {
            font-size: 0.85rem;
            color: #6f5a46;
        }

        .price-drop {
            font-weight: 600;
            color: #b45a2b;
            margin-top: 5px;
        }

        .pechka-card {
            background: #ffffff;
            border-radius: 36px;
            max-width: 760px;
            margin: 30px auto;
            padding: 28px 28px 32px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            border: 1px solid #eadbcb;
            transition: 0.2s;
            display: none;
        }

        .pechka-card.show {
            display: block;
        }

        .pechka-card img {
            width: 100%;
            max-height: 350px;
            min-height: 270px;
            object-fit: contain;
            background: #ffffff;
            border-radius: 32px;
            margin-bottom: 22px;
            display: block;
            border: 1px solid #ecdbba;
            filter: brightness(1.05) contrast(1.1);
        }

        .pechka-card h2 {
            font-size: 1.8rem;
            font-weight: 460;
            color: #9b4f23;
            margin: 12px 0 12px;
            text-align: center;
        }

        .specs {
            background: #fef8f2;
            padding: 16px 20px;
            border-radius: 28px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #3f3328;
            margin: 20px 0;
            border-left: 5px solid #e2bc94;
        }

        .price {
            font-size: 1.9rem;
            font-weight: 500;
            color: #bc631c;
            text-align: center;
            margin: 20px 0 16px;
        }

        .addons {
            background: #fdf8f1;
            border-radius: 28px;
            padding: 8px 6px;
            margin-top: 8px;
        }

        .addon-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 60px;
            cursor: pointer;
            transition: background 0.15s;
            background: #ffffff;
            border: 1px solid #eadbcb;
        }

        .addon-item:hover {
            background: #fff3e8;
        }

        .addon-item label {
            font-weight: 500;
            cursor: pointer;
            flex: 1;
            user-select: none;
        }

        .addon-price {
            font-weight: 500;
            color: #bd631e;
            padding-left: 12px;
            user-select: none;
        }

        .add-to-cart, .send-btn {
            background: #d97a2b;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            font-family: inherit;
            font-weight: 500;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            margin-top: 24px;
        }

        .add-to-cart:hover, .send-btn:hover {
            background: #c06622;
            transform: scale(1.01);
        }

        .cart-section {
            background: #fefaf5;
            border-radius: 32px;
            padding: 24px;
            max-width: 720px;
            margin: 40px auto;
            border: 1px solid #e5d5c4;
        }

        .cart-item {
            background: white;
            padding: 12px 18px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border: 1px solid #e6d8ca;
        }

        .remove-item {
            background: none;
            border: 1px solid #cfb692;
            border-radius: 40px;
            padding: 5px 16px;
            cursor: pointer;
        }

        .remove-item:hover {
            background: #f2e0d0;
        }

        .total {
            text-align: right;
            font-size: 1.3rem;
            font-weight: 500;
            margin-top: 18px;
            padding-top: 12px;
            border-top: 1px solid #e1cfbe;
        }

        .empty-cart {
            text-align: center;
            color: #aa8f72;
            padding: 20px;
        }

        .order-form {
            margin-top: 28px;
        }

        .order-form input, .order-form textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #d9c7b4;
            border-radius: 40px;
            font-family: inherit;
            background: white;
        }

        .success-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #e0c4a4;
            color: #2c241c;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 999;
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Банные печи</h1>
    <div class="subtitle">Каменные печи, баки, колена — всё для настоящей парной</div>

    <div class="dropdown-container">
        <button class="dropdown-btn" id="dropdownBtn">📋 Выбрать печь <span>▼</span></button>
        <div class="dropdown-content" id="dropdownContent"></div>
    </div>

    <div id="pechkaCard" class="pechka-card">
        <img id="cardImage" src="" alt="Печь">
        <h2 id="cardName"></h2>
        <div class="specs" id="cardSpecs"></div>
        <div class="price" id="cardPrice"></div>
        <div class="addons" id="addonsBlock"></div>
        <button class="add-to-cart" id="addToCartBtn">➕ Добавить в корзину</button>
    </div>

    <div class="cart-section">
        <h2 style="font-weight:400;">Корзина</h2>
        <div id="cartItems"><div class="empty-cart">Пока пусто</div></div>
        <div class="total">💰 Итого: <span id="totalSum">0</span> ₽</div>
        <div class="order-form" id="orderForm" style="display:none;">
            <h3 style="margin:10px 0 5px;">Для заказа</h3>
            <input type="text" id="customerName" placeholder="Ваше имя *">
            <input type="email" id="customerEmail" placeholder="Email *">
            <input type="tel" id="customerPhone" placeholder="Телефон *">
            <textarea id="customerAddress" placeholder="Адрес доставки" rows="2"></textarea>
            <button class="send-btn" id="sendOrderBtn">📨 Отправить заказ в Telegram</button>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = "8765410107:AAGkrWF4g0XzQzdUyYAOcX7DS019zGjmSBA";
    const CHAT_ID = "2013568102";

    const pechki = [

        {id:5, name:"Печь Ø426 лежачая + чёрный бак", price:21000, specs:"🏠 до 25 м³ + бак 65 л<br>💧 Сталь 2 мм", img:"https://placehold.co/600x450/e8cfb0/white?text=426+леж+бак"},
        {id:6, name:"Печь Ø426 лежачая + бак нерж", price:26500, specs:"💧 Нержавейка 1 мм, 65 л", img:"https://placehold.co/600x450/e8cfb0/white?text=426+леж+нерж"},
        {id:7, name:"Печь Ø426 открытая каменка, без бака", price:12000, specs:"🏠 15 м³, 426×550 мм", img:"https://placehold.co/600x450/e8cfb0/white?text=426+откр"},
        {id:8, name:"Печь Ø426 открытая + чёрный бак", price:16500, specs:"💧 Бак 65 л, сталь 2 мм", img:"https://placehold.co/600x450/e8cfb0/white?text=426+откр+бак"},
        {id:9, name:"Печь Ø426 открытая + бак нерж", price:22000, specs:"💧 Нержавейка 1 мм, 65 л", img:"https://placehold.co/600x450/e8cfb0/white?text=426+откр+нерж"},
        {id:10, name:"Печь Ø530 поворотная каменка, без бака", price:21500, specs:"🏠 до 35 м³ (12 м²)<br>📐 550×750×800 мм", img:"https://placehold.co/600x450/e8cfb0/white?text=530+поворт"},
        {id:11, name:"Печь Ø530 поворотная + чёрный бак", price:26500, specs:"💧 Бак 85 л, сталь 2 мм", img:"https://placehold.co/600x450/e8cfb0/white?text=530+поворт+бак"},
        {id:12, name:"Печь Ø530 поворотная + бак нерж", price:32500, specs:"💧 Нерж 1 мм, 85 л", img:"https://placehold.co/600x450/e8cfb0/white?text=530+поворт+нерж"},
        {id:13, name:"Печь социальная, без выступа", price:14000, specs:"🏠 15 м³ (6 м²)<br>📐 530×600×500 мм", img:"https://placehold.co/600x450/e8cfb0/white?text=Соц+печь"},
        {id:14, name:"Печь социальная + чёрный бак", price:19500, specs:"💧 Бак 50 л, сталь 2 мм", img:"https://placehold.co/600x450/e8cfb0/white?text=Соц+чёрн"},
        {id:15, name:"Печь социальная + бак нерж", price:24000, specs:"💧 Нерж 50 л, 1 мм", img:"https://placehold.co/600x450/e8cfb0/white?text=Соц+нерж"},
        {id:16, name:"Печь на 2-3 помещения + чёрный бак", price:38000, specs:"🏠 Парилка до 20 м³, лабиринт<br>💧 Бак 75 л, чёрный", img:"https://placehold.co/600x450/e8cfb0/white?text=3+помещ"},
        {id:17, name:"Печь на 2-3 помещения + бак нерж", price:45000, specs:"🏠 Лабиринт, 75 л нерж", img:"https://placehold.co/600x450/e8cfb0/white?text=3+пом+нерж"},
        {id:18, name:"Буржуйка №1 (426 труба)", price:9000, specs:"🏠 до 150 м³, 500×426×450<br>🔥 8 мм + кружок", img:"https://placehold.co/600x450/e8cfb0/white?text=Буржуйка+426"},
        {id:19, name:"Буржуйка №2 (530 труба)", price:10000, specs:"🏠 до 200 м³, 8 мм + кружок", img:"https://placehold.co/600x450/e8cfb0/white?text=Буржуйка+530"},
        {id:20, name:"Буржуйка Талти", price:18000, specs:"🏠 до 200 м³, 24 ч горения", img:"https://placehold.co/600x450/e8cfb0/white?text=Талти"},
        {id:21, name:"Котёл малый 1/2 плиты", price:20500, specs:"🏠 80-100 м², 550×430×600", img:"https://placehold.co/600x450/e8cfb0/white?text=Котёл+малый"},
        {id:22, name:"Котёл большой 1/2 плиты", price:26500, specs:"🏠 100-130 м², 720×430×600", img:"https://placehold.co/600x450/e8cfb0/white?text=Котёл+большой"},
        {id:23, name:"Котёл с водяным верхом", price:27500, specs:"🏠 до 200 м², водяной контур", img:"https://placehold.co/600x450/e8cfb0/white?text=Котёл+ВВ"},
        {id:24, name:"Печь-буржуйка TALTY", price:18000, specs:"24 ч горения", img:"https://placehold.co/600x450/e8cfb0/white?text=TALTY"},
        {id:25, name:"Печь бочка, без бака", price:29000, specs:"🏠 до 25 м³, лабиринт", img:"https://placehold.co/600x450/e8cfb0/white?text=Бочка"},
        {id:26, name:"Печь бочка + чёрный бак", price:34500, specs:"💧 бак 65 л чёрный", img:"https://placehold.co/600x450/e8cfb0/white?text=Бочка+бак"},
        {id:27, name:"Печь бочка + бак нерж", price:39000, specs:"💧 нерж 65 л", img:"https://placehold.co/600x450/e8cfb0/white?text=Бочка+нерж"},
        {id:28, name:"Печь 'Корабль', без бака", price:36000, specs:"🏠 до 35 м³, сталь 4/8 мм", img:"https://placehold.co/600x450/e8cfb0/white?text=Корабль"},
        {id:29, name:"Печь 'Корабль' + чёрный бак", price:41000, specs:"💧 бак 85 л чёрный", img:"https://placehold.co/600x450/e8cfb0/white?text=Корабль+бак"},
        {id:30, name:"Печь 'Корабль' + бак нерж", price:46000, specs:"💧 нерж 85 л, 1 мм", img:"https://placehold.co/600x450/e8cfb0/white?text=Корабль+нерж"}
    ];

    const addonsList = [
        {id:"b1", name:"Бак нерж 65 л, 1 мм", price:9500},
        {id:"b2", name:"Бак нерж 65 л, 1.5 мм", price:12500},
        {id:"b3", name:"Бак нерж 85 л, 1 мм", price:13500},
        {id:"b4", name:"Бак нерж 85 л, 1.5 мм", price:15500},
        {id:"elbow", name:"Колено Ø115 мм 45° (нерж)", price:600},
        {id:"roof", name:"Зонт Ø115 мм (нерж)", price:1000},
        {id:"clamp", name:"Хомут обжимной Ø115 мм", price:350}
    ];

    let cart = [];
    let currentPechka = null;
    let selectedAddons = {};

    function showMessage(text, isErr) {
        let m = document.createElement('div');
        m.className = 'success-msg';
        m.innerText = text;
        if(isErr) m.style.background = "#d9ae84";
        document.body.appendChild(m);
        setTimeout(()=>m.remove(), 2800);
    }

    function loadDropdown() {
        let html = '';
        for(let p of pechki) {
            html += `<div class="dropdown-item" onclick="selectPechka(${p.id})">
                        <h4>🔥 ${p.name}</h4>
                        <p>${p.specs.split('<br>')[0]}</p>
                        <div class="price-drop">${p.price.toLocaleString('ru-RU')} ₽</div>
                    </div>`;
        }
        document.getElementById('dropdownContent').innerHTML = html;
    }

    function renderAddons() {
        let html = '<h3 style="margin:15px 0 8px;">➕ Дополнительное оборудование</h3>';
        for(let a of addonsList) {
            let isChecked = selectedAddons[a.id] ? 'checked' : '';
            html += `<div class="addon-item" data-id="${a.id}" data-price="${a.price}" data-name="${a.name}">
                        <label>
                            <input type="checkbox" class="addon-checkbox" data-id="${a.id}" data-price="${a.price}" data-name="${a.name}" ${isChecked}>
                            ${a.name}
                        </label>
                        <span class="addon-price">${a.price.toLocaleString('ru-RU')} ₽</span>
                    </div>`;
        }
        document.getElementById('addonsBlock').innerHTML = html;

        // Навешиваем обработчики на каждый доп
        document.querySelectorAll('.addon-item').forEach(item => {
            const checkbox = item.querySelector('.addon-checkbox');
            const id = checkbox.getAttribute('data-id');
            const name = checkbox.getAttribute('data-name');
            const price = parseInt(checkbox.getAttribute('data-price'));
            
            // Обработчик клика по всей строке
            item.addEventListener('click', (e) => {
                if(e.target.tagName !== 'INPUT') {
                    checkbox.checked = !checkbox.checked;
                    if(checkbox.checked) {
                        selectedAddons[id] = { name, price };
                    } else {
                        delete selectedAddons[id];
                    }
                    updateCurrentPriceDisplay();
                }
            });
            
            // Обработчик клика по чекбоксу
            checkbox.addEventListener('click', (e) => {
                e.stopPropagation();
                if(checkbox.checked) {
                    selectedAddons[id] = { name, price };
                } else {
                    delete selectedAddons[id];
                }
                updateCurrentPriceDisplay();
            });
        });
    }

    function updateCurrentPriceDisplay() {
        if(!currentPechka) return;
        let addSum = 0;
        for(let key in selectedAddons) {
            addSum += selectedAddons[key].price;
        }
        let total = currentPechka.price + addSum;
        document.getElementById('cardPrice').innerHTML = `💰 ${total.toLocaleString('ru-RU')} ₽`;
    }

    function selectPechka(id) {
        currentPechka = pechki.find(p=>p.id===id);
        selectedAddons = {};
        let cardDiv = document.getElementById('pechkaCard');
        document.getElementById('cardImage').src = currentPechka.img;
        document.getElementById('cardName').innerText = currentPechka.name;
        document.getElementById('cardSpecs').innerHTML = currentPechka.specs;
        document.getElementById('cardPrice').innerHTML = `💰 ${currentPechka.price.toLocaleString('ru-RU')} ₽`;
        renderAddons();
        cardDiv.classList.add('show');
        document.getElementById('dropdownContent').classList.remove('show');
    }

    function updateCartDisplay() {
        let container = document.getElementById('cartItems');
        let totalSpan = document.getElementById('totalSum');
        if(cart.length===0) {
            container.innerHTML = '<div class="empty-cart">Пока пусто</div>';
            totalSpan.innerText = '0';
            document.getElementById('orderForm').style.display = 'none';
            return;
        }
        let total=0, html='';
        for(let i=0;i<cart.length;i++) {
            html += `<div class="cart-item">
                        <span><strong>${cart[i].name}</strong> — ${cart[i].price.toLocaleString('ru-RU')} ₽</span>
                        <button class="remove-item" onclick="removeFromCart(${i})">Убрать</button>
                    </div>`;
            total += cart[i].price;
        }
        container.innerHTML = html;
        totalSpan.innerText = total.toLocaleString('ru-RU');
        document.getElementById('orderForm').style.display = 'block';
    }

    function removeFromCart(idx) {
        cart.splice(idx,1);
        updateCartDisplay();
    }

    function addToCart() {
        if(!currentPechka) { showMessage('Сначала выберите печь', true); return; }
        cart.push({ name: currentPechka.name, price: currentPechka.price });
        for(let k in selectedAddons) {
            cart.push({ name: selectedAddons[k].name, price: selectedAddons[k].price });
        }
        updateCartDisplay();
        showMessage(`✓ ${currentPechka.name} и допы в корзине`);
    }

    async function sendOrder() {
        let name = document.getElementById('customerName').value.trim();
        let email = document.getElementById('customerEmail').value.trim();
        let phone = document.getElementById('customerPhone').value.trim();
        let address = document.getElementById('customerAddress').value;
        if(!name || !email || !phone) { showMessage('Заполните имя, email и телефон', true); return; }
        if(cart.length===0) { showMessage('Корзина пуста', true); return; }

        let items = '';
        let total = 0;
        for(let it of cart) {
            items += `${it.name} — ${it.price.toLocaleString('ru-RU')} ₽\n`;
            total += it.price;
        }
        let msg = `🔥 НОВЫЙ ЗАКАЗ!\nИмя: ${name}\nEmail: ${email}\nТелефон: ${phone}\nАдрес: ${address || 'не указан'}\n\nЗаказ:\n${items}\nИТОГО: ${total.toLocaleString('ru-RU')} ₽`;
        try {
            let res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
            });
            let json = await res.json();
            if(json.ok) {
                showMessage('✅ Заказ отправлен в Telegram');
                cart = []; updateCartDisplay();
                document.getElementById('customerName').value = '';
                document.getElementById('customerEmail').value = '';
                document.getElementById('customerPhone').value = '';
                document.getElementById('customerAddress').value = '';
            } else showMessage('Ошибка, но заказ сохранён', true);
        } catch(e) { showMessage('Ошибка соединения (проверьте интернет или VPN)', true); }
    }

    document.getElementById('dropdownBtn').onclick = () => document.getElementById('dropdownContent').classList.toggle('show');
    document.getElementById('addToCartBtn').onclick = addToCart;
    document.getElementById('sendOrderBtn').onclick = sendOrder;
    document.onclick = (e) => { if(!e.target.closest('.dropdown-container')) document.getElementById('dropdownContent').classList.remove('show'); };
    loadDropdown();
</script>
</body>
</html>
