<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кафе Миас - Заказ еды</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #111);
            color: var(--tg-theme-text-color, white);
            padding: 20px;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header h1 {
            color: #ffaa00;
            font-size: 28px;
            margin-bottom: 5px;
            cursor: pointer;
            user-select: none;
        }
        .header .subtitle {
            color: var(--tg-theme-hint-color, #888);
            font-size: 14px;
        }
        .menu-grid {
            display: grid;
            gap: 15px;
            margin: 20px 0;
        }
        .menu-item {
            background: var(--tg-theme-secondary-bg-color, #1a1a1a);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        .menu-item:active {
            transform: scale(0.98);
        }
        .item-info {
            text-align: left;
            flex: 1;
        }
        .item-info h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }
        .item-info .price {
            color: #ffaa00;
            font-weight: bold;
            font-size: 16px;
        }
        .item-info .desc {
            color: var(--tg-theme-hint-color, #888);
            font-size: 13px;
        }
        .item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .item-controls .qty {
            font-size: 18px;
            min-width: 30px;
            text-align: center;
            font-weight: bold;
        }
        .btn {
            background: var(--tg-theme-button-color, #ff5500);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            touch-action: manipulation;
        }
        .btn:active {
            opacity: 0.7;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 16px;
            min-width: 30px;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--tg-theme-button-color, #ff5500);
            color: var(--tg-theme-button-color, #ff5500);
        }
        .btn-danger {
            background: #ff4444;
        }
        .btn-success {
            background: #44bb44;
        }
        .btn-block {
            width: 100%;
            margin-top: 10px;
        }

        /* Корзина */
        .cart {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #1a1a1a);
            padding: 15px 20px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
            display: none;
            flex-direction: column;
            gap: 10px;
            border-top: 2px solid #ffaa00;
            z-index: 1000;
        }
        .cart.active {
            display: flex;
        }
        .cart-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-items {
            max-height: 150px;
            overflow-y: auto;
            font-size: 14px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .cart-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .cart-total {
            font-size: 18px;
            font-weight: bold;
            color: #ffaa00;
        }

        /* Форма заказа */
        .order-form {
            background: var(--tg-theme-secondary-bg-color, #1a1a1a);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            display: none;
            animation: slideUp 0.3s ease;
        }
        .order-form.active {
            display: block;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .order-form h2 {
            color: #ffaa00;
            margin-bottom: 15px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #888);
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--tg-theme-bg-color, #111);
            color: var(--tg-theme-text-color, white);
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #ffaa00;
        }
        .form-group select option {
            background: #111;
        }

        .error-box {
            background: #2a1a1a;
            border: 1px solid #ff4444;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: none;
        }
        .error-box.active {
            display: block;
        }
        .error-box h3 {
            color: #ff4444;
            margin-bottom: 10px;
        }

        .success-box {
            background: #1a2a1a;
            border: 1px solid #44ff44;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: none;
            text-align: center;
        }
        .success-box.active {
            display: block;
        }
        .success-box h3 {
            color: #44ff44;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .success-box .order-summary {
            margin: 15px 0;
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #888);
        }
        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0% {
                content: '.';
            }
            33% {
                content: '..';
            }
            66% {
                content: '...';
            }
        }

        .debug {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 12px;
            color: #ff6b6b;
            display: none;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }
        .debug.active {
            display: block;
        }

        .footer {
            text-align: center;
            padding: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Стили для полей с ошибками */
        .form-group.error input,
        .form-group.error textarea {
            border-color: #ff4444;
            box-shadow: 0 0 0 2px rgba(255, 68, 68, 0.2);
        }
        .form-group .error-text {
            color: #ff4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .form-group.error .error-text {
            display: block;
        }

        /* Скрытая админ-ссылка */
        .admin-link {
            text-align: center;
            padding: 15px 0;
            margin-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
        }
        .admin-link a {
            color: #666;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }
        .admin-link a:hover {
            color: #ffaa00;
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .menu-item {
                flex-direction: column;
                gap: 10px;
            }
            .item-controls {
                width: 100%;
                justify-content: flex-end;
            }
            .cart-bottom {
                flex-direction: column;
            }
            .cart-bottom .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="logoTitle">🍖 Кафе «Миас»</h1>
        <p class="subtitle" id="greeting">👋 Добро пожаловать!</p>
    </div>

    <!-- Блок ошибок -->
    <div class="error-box" id="errorBox">
        <h3>⚠️ Ошибка</h3>
        <p id="errorMessage">Что-то пошло не так</p>
        <button class="btn" onclick="hideError()" style="margin-top:10px;">Понятно</button>
    </div>

    <!-- Блок успеха -->
    <div class="success-box" id="successBox">
        <h3>✅ Заказ отправлен!</h3>
        <p id="successMessage">Ваш заказ принят. Ожидайте подтверждения.</p>
        <button class="btn" onclick="hideSuccess()" style="margin-top:10px;">🔄 Новый заказ</button>
    </div>

    <!-- Меню -->
    <div id="menuContainer">
        <div class="loading" id="loadingIndicator">Загрузка меню</div>
        <div class="menu-grid" id="menu"></div>
    </div>

    <!-- ФОРМА ЗАКАЗА -->
    <div class="order-form" id="orderForm">
        <h2>📝 Оформление заказа</h2>

        <div class="form-group" id="nameGroup">
            <label>👤 Ваше имя *</label>
            <input type="text" id="customerName" placeholder="Введите ваше имя">
            <div class="error-text">Пожалуйста, введите имя</div>
        </div>

        <div class="form-group" id="phoneGroup">
            <label>📱 Телефон *</label>
            <input type="tel" id="customerPhone" placeholder="+7 (999) 999-99-99">
            <div class="error-text">Пожалуйста, введите номер телефона</div>
        </div>

        <div class="form-group">
            <label>⏰ Время доставки</label>
            <select id="deliveryTime">
                <option value="как можно скорее">Как можно скорее</option>
                <option value="через 30 минут">Через 30 минут</option>
                <option value="через 1 час">Через 1 час</option>
                <option value="через 1.5 часа">Через 1.5 часа</option>
                <option value="через 2 часа">Через 2 часа</option>
            </select>
        </div>

        <div class="form-group">
            <label>💬 Комментарий к заказу</label>
            <textarea id="customerComment" placeholder="Пожелания, особые указания, аллергии..."></textarea>
        </div>

        <button class="btn btn-block" onclick="submitOrder()">🚀 Отправить заказ</button>
        <button class="btn btn-secondary btn-block" onclick="closeOrderForm()">✕ Вернуться к меню</button>
    </div>

    <!-- Корзина -->
    <div class="cart" id="cart">
        <div class="cart-top">
            <span>🛒 Корзина (<span id="cartCount">0</span> позиций)</span>
            <button class="btn btn-sm btn-danger" onclick="clearCart()">Очистить</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-bottom">
            <span class="cart-total" id="cartTotal">0₽</span>
            <button class="btn" onclick="showOrderForm()">Оформить заказ</button>
        </div>
    </div>

    <!-- Скрытая ссылка на админ-панель -->
    <div class="admin-link" id="adminLink">
        <a href="admin.html" target="_blank">🛠 Админ-панель управления меню</a>
    </div>

    <!-- Подвал -->
    <div class="footer">
        <button class="btn btn-secondary" onclick="tg.close()">✕ Закрыть</button>
        <button class="btn btn-secondary" onclick="showDebug()">🐛 Диагностика</button>
    </div>

    <!-- Отладка -->
    <div class="debug" id="debugInfo"></div>

    <script>
        // ============================================
        // ===== НАСТРОЙКИ БОТА =====
        // ============================================
        const BOT_TOKEN = '8980208297:AAGm8N55yZ-RN5ao_uxCoFHYLiSHq1eyfss';
        
        // ⚠️ ВАЖНО: ЗАМЕНИТЕ НА СВОЙ РЕАЛЬНЫЙ ID ПОЛУЧЕННЫЙ ОТ @userinfobot
        const ADMIN_CHAT_ID = '2013568102'; // <--- ЭТО ВАШ ID, НЕ МЕНЯЙТЕ ЕСЛИ ОН ВЕРНЫЙ!

        // ============================================
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        // ============================================
        const tg = window.Telegram.WebApp;
        let cart = [];

        try {
            tg.expand();
            tg.ready();
            console.log('✅ Web App загружен');
        } catch (e) {
            console.error('Telegram init error:', e);
        }

        let currentUser = null;
        try {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                currentUser = user;
                document.getElementById('greeting').textContent = `👋 Привет, ${user.first_name}!`;
                document.getElementById('customerName').value = user.first_name || '';
                document.getElementById('customerName').placeholder = user.first_name || 'Ваше имя';
                console.log('✅ Пользователь:', user.first_name, 'ID:', user.id);
            } else {
                console.log('⚠️ Пользователь не авторизован в Telegram');
            }
        } catch (e) {
            console.warn('User data error:', e);
        }

        // ============================================
        // ===== СКРЫТАЯ АДМИН-ССЫЛКА =====
        // ============================================
        (function() {
            // Показываем только если это админ
            if (currentUser && String(currentUser.id) === ADMIN_CHAT_ID) {
                document.getElementById('adminLink').style.display = 'block';
                console.log('✅ Админ-панель доступна');
                return;
            }

            // Секретный способ: 5 кликов по логотипу
            let clickCount = 0;
            let clickTimer = null;
            
            document.getElementById('logoTitle')?.addEventListener('click', function() {
                clickCount++;
                if (clickCount === 1) {
                    clickTimer = setTimeout(() => {
                        clickCount = 0;
                    }, 1000);
                } else if (clickCount >= 5) {
                    clearTimeout(clickTimer);
                    clickCount = 0;
                    
                    if (currentUser && String(currentUser.id) === ADMIN_CHAT_ID) {
                        document.getElementById('adminLink').style.display = 'block';
                        tg.HapticFeedback?.notificationOccurred('success');
                        tg.showAlert('🔑 Админ-панель открыта!');
                    } else {
                        tg.HapticFeedback?.notificationOccurred('error');
                        tg.showAlert('⛔ У вас нет доступа');
                    }
                }
            });

            console.log('🔒 Админ-панель скрыта от клиентов');
        })();

        // ============================================
        // ===== ЗАГРУЗКА МЕНЮ =====
        // ============================================
        function getDefaultMenu() {
            return [
                { id: 1, name: 'Шашлык из свинины', price: 350, desc: 'Сочный, на углях', category: 'Мясо' },
                { id: 2, name: 'Люля-кебаб', price: 280, desc: 'С бараниной и специями', category: 'Мясо' },
                { id: 3, name: 'Салат "Миас"', price: 220, desc: 'Свежий, с овощами', category: 'Салаты' },
                { id: 4, name: 'Чай с мятой', price: 150, desc: 'Горячий, тонизирующий', category: 'Напитки' },
                { id: 5, name: 'Хинкали', price: 250, desc: 'С мясом и бульоном', category: 'Мясо' },
                { id: 6, name: 'Компот', price: 120, desc: 'Домашний, из сухофруктов', category: 'Напитки' },
                { id: 7, name: 'Картофель фри', price: 180, desc: 'Хрустящий, с солью', category: 'Гарниры' },
                { id: 8, name: 'Мороженое', price: 160, desc: 'Ванильное, с шоколадом', category: 'Десерты' },
            ];
        }

        function getMenuItems() {
            try {
                const data = localStorage.getItem('cafe_menu_items');
                if (data) {
                    const items = JSON.parse(data);
                    if (items && items.length > 0) {
                        return items;
                    }
                }
            } catch (e) {
                console.error('Error loading menu:', e);
            }
            const defaultMenu = getDefaultMenu();
            localStorage.setItem('cafe_menu_items', JSON.stringify(defaultMenu));
            return defaultMenu;
        }

        let menuItems = [];

        function loadMenu() {
            const container = document.getElementById('menu');
            const loading = document.getElementById('loadingIndicator');

            try {
                menuItems = getMenuItems();

                if (!container) throw new Error('Контейнер меню не найден');

                if (loading) loading.style.display = 'none';
                container.innerHTML = '';

                if (menuItems.length === 0) {
                    container.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">📭 Меню пока пусто</div>';
                    return;
                }

                menuItems.forEach((item) => {
                    const div = document.createElement('div');
                    div.className = 'menu-item';
                    div.innerHTML = `
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <div class="desc">${item.desc || ''} ${item.category ? '· ' + item.category : ''}</div>
                            <div class="price">${item.price}₽</div>
                        </div>
                        <div class="item-controls">
                            <button class="btn btn-sm btn-secondary" onclick="changeQuantity(${item.id}, -1)">−</button>
                            <span class="qty" id="qty_${item.id}">0</span>
                            <button class="btn btn-sm" onclick="changeQuantity(${item.id}, 1)">+</button>
                        </div>
                    `;
                    container.appendChild(div);
                });

                document.getElementById('errorBox').classList.remove('active');
                console.log('✅ Меню загружено, позиций:', menuItems.length);
            } catch (e) {
                showError('Ошибка загрузки меню: ' + e.message);
            }
        }

        // ===== АВТООБНОВЛЕНИЕ МЕНЮ (КАЖДЫЕ 10 СЕКУНД) =====
        let lastMenuHash = '';

        function checkMenuUpdates() {
            try {
                const data = localStorage.getItem('cafe_menu_items');
                if (data) {
                    const currentHash = data.length + '_' + data;
                    if (currentHash !== lastMenuHash) {
                        lastMenuHash = currentHash;
                        const newMenu = JSON.parse(data);
                        if (newMenu && newMenu.length > 0) {
                            const oldNames = menuItems.map(i => i.name + i.price + i.desc).join('|');
                            const newNames = newMenu.map(i => i.name + i.price + i.desc).join('|');
                            if (oldNames !== newNames) {
                                console.log('🔄 Меню обновлено!');
                                menuItems = newMenu;
                                loadMenu();
                                if (tg) {
                                    tg.HapticFeedback?.notificationOccurred('success');
                                }
                            }
                        }
                    }
                }
            } catch (e) {
                console.error('Check updates error:', e);
            }
        }

        setInterval(checkMenuUpdates, 10000);

        // ============================================
        // ===== КОРЗИНА =====
        // ============================================
        function changeQuantity(id, delta) {
            try {
                const item = menuItems.find(i => i.id === id);
                if (!item) throw new Error('Товар не найден');

                const existing = cart.find(i => i.id === id);
                if (existing) {
                    existing.quantity = Math.max(0, (existing.quantity || 1) + delta);
                    if (existing.quantity <= 0) {
                        cart = cart.filter(i => i.id !== id);
                    }
                } else if (delta > 0) {
                    cart.push({ ...item, quantity: 1 });
                }

                updateCart();
                updateQuantityDisplay(id);
                tg.HapticFeedback?.impactOccurred('light');
            } catch (e) {
                console.error('Change quantity error:', e);
            }
        }

        function updateQuantityDisplay(id) {
            const el = document.getElementById(`qty_${id}`);
            if (el) {
                const item = cart.find(i => i.id === id);
                el.textContent = item ? item.quantity : 0;
            }
        }

        function updateCart() {
            const cartEl = document.getElementById('cart');
            const countEl = document.getElementById('cartCount');
            const totalEl = document.getElementById('cartTotal');
            const itemsEl = document.getElementById('cartItems');

            if (cart.length > 0) {
                cartEl.classList.add('active');
                const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);
                const totalPrice = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);

                countEl.textContent = totalItems;
                totalEl.textContent = totalPrice + '₽';

                itemsEl.innerHTML = cart.map(item =>
                    `<div class="cart-item">
                        <span>${item.name} × ${item.quantity}</span>
                        <span>${item.price * item.quantity}₽</span>
                    </div>`
                ).join('');
            } else {
                cartEl.classList.remove('active');
            }
        }

        function clearCart() {
            if (cart.length === 0) return;
            if (confirm('Очистить корзину?')) {
                cart = [];
                updateCart();
                menuItems.forEach(item => updateQuantityDisplay(item.id));
                tg.HapticFeedback?.impactOccurred('medium');
            }
        }

        // ============================================
        // ===== ФОРМА ЗАКАЗА =====
        // ============================================
        function showOrderForm() {
            if (cart.length === 0) {
                tg.showAlert('🛒 Корзина пуста! Добавьте блюда.');
                return;
            }
            document.getElementById('orderForm').classList.add('active');
            document.getElementById('cart').style.display = 'none';
            document.getElementById('orderForm').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function closeOrderForm() {
            document.getElementById('orderForm').classList.remove('active');
            document.getElementById('cart').style.display = 'flex';
        }

        function validateForm() {
            let isValid = true;

            const name = document.getElementById('customerName').value.trim();
            const nameGroup = document.getElementById('nameGroup');
            if (!name) {
                nameGroup.classList.add('error');
                isValid = false;
            } else {
                nameGroup.classList.remove('error');
            }

            const phone = document.getElementById('customerPhone').value.trim();
            const phoneGroup = document.getElementById('phoneGroup');
            if (!phone || phone.length < 5) {
                phoneGroup.classList.add('error');
                isValid = false;
            } else {
                phoneGroup.classList.remove('error');
            }

            if (!isValid) {
                tg.showAlert('⚠️ Заполните все обязательные поля!');
            }

            return isValid;
        }

        // ============================================
        // ===== ОТПРАВКА ЗАКАЗА (ИСПРАВЛЕННАЯ) =====
        // ============================================
        function submitOrder() {
            // ===== ВАЛИДАЦИЯ =====
            if (!validateForm()) return;

            try {
                const name = document.getElementById('customerName').value.trim();
                const phone = document.getElementById('customerPhone').value.trim();
                const deliveryTime = document.getElementById('deliveryTime').value;
                const comment = document.getElementById('customerComment').value.trim();

                const user = tg.initDataUnsafe?.user || { id: 'guest', first_name: 'Гость' };
                const orderId = String(Date.now()).slice(-6);

                const order = {
                    id: orderId,
                    customer: { name, phone, deliveryTime, comment },
                    items: cart.map(item => ({
                        name: item.name,
                        quantity: item.quantity,
                        price: item.price,
                        total: item.price * item.quantity
                    })),
                    total: cart.reduce((sum, i) => sum + (i.price * i.quantity), 0),
                    timestamp: new Date().toISOString(),
                    user: user,
                    status: 'new'
                };

                console.log('📦 Заказ:', order);

                // ==========================================
                // ===== 1. ОТПРАВКА АДМИНУ (ВАМ) =====
                // ==========================================
                
                let adminMsg = '🆕 <b>НОВЫЙ ЗАКАЗ!</b>\n';
                adminMsg += '━━━━━━━━━━━━━━━━\n\n';
                adminMsg += `👤 <b>Клиент:</b> ${order.customer.name}\n`;
                adminMsg += `📱 <b>Телефон:</b> ${order.customer.phone}\n`;
                adminMsg += `⏰ <b>Время:</b> ${order.customer.deliveryTime}\n`;
                adminMsg += `🆔 <b>Заказ #${order.id}</b>\n`;

                if (order.customer.comment) {
                    adminMsg += `💬 <b>Комментарий:</b> ${order.customer.comment}\n`;
                }

                adminMsg += '\n━━━━━━━━━━━━━━━━\n';
                adminMsg += '<b>📦 СОСТАВ ЗАКАЗА:</b>\n\n';

                order.items.forEach((item, index) => {
                    adminMsg += `${index+1}. ${item.name} × ${item.quantity} = <b>${item.total}₽</b>\n`;
                });

                adminMsg += '\n━━━━━━━━━━━━━━━━\n';
                adminMsg += `💰 <b>ИТОГО:</b> ${order.total}₽\n`;
                adminMsg += `🕐 ${new Date().toLocaleString('ru-RU')}\n`;
                adminMsg += `👤 От: ${user.first_name || 'Гость'}`;

                // Отправляем админу
                console.log('📤 Отправка админу...');
                console.log('ADMIN_CHAT_ID:', ADMIN_CHAT_ID);
                
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_CHAT_ID,
                        text: adminMsg,
                        parse_mode: 'HTML'
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.ok) {
                        console.log('✅ Заказ отправлен админу!');
                    } else {
                        console.error('❌ Ошибка отправки админу:', data);
                        console.log('Описание ошибки:', data.description);
                    }
                })
                .catch(err => {
                    console.error('❌ Ошибка сети при отправке админу:', err);
                });

                // ==========================================
                // ===== 2. ОТПРАВКА ПОКУПАТЕЛЮ =====
                // ==========================================

                if (user.id !== 'guest') {
                    let customerMsg = '✅ <b>Ваш заказ принят!</b>\n';
                    customerMsg += '━━━━━━━━━━━━━━━━\n\n';
                    customerMsg += `🍖 <b>Кафе «Миас»</b>\n`;
                    customerMsg += `🆔 Заказ #${order.id}\n\n`;
                    customerMsg += `👤 <b>Клиент:</b> ${order.customer.name}\n`;
                    customerMsg += `📱 <b>Телефон:</b> ${order.customer.phone}\n`;
                    customerMsg += `⏰ <b>Время доставки:</b> ${order.customer.deliveryTime}\n\n`;
                    customerMsg += '<b>📦 Ваш заказ:</b>\n';

                    order.items.forEach((item, index) => {
                        customerMsg += `${index+1}. ${item.name} × ${item.quantity} = <b>${item.total}₽</b>\n`;
                    });

                    customerMsg += '\n━━━━━━━━━━━━━━━━\n';
                    customerMsg += `💰 <b>Итого:</b> ${order.total}₽\n\n`;
                    customerMsg += '☎️ <b>Ожидайте звонка оператора для подтверждения!</b>';

                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: user.id,
                            text: customerMsg,
                            parse_mode: 'HTML'
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.ok) {
                            console.log('✅ Уведомление отправлено покупателю');
                        } else {
                            console.error('❌ Ошибка отправки покупателю:', data);
                        }
                    })
                    .catch(err => {
                        console.error('❌ Ошибка сети при отправке покупателю:', err);
                    });
                }

                // ==========================================
                // ===== 3. СОХРАНЕНИЕ ЗАКАЗА =====
                // ==========================================

                try {
                    const key = 'cafe_orders';
                    let orders = [];
                    const data = localStorage.getItem(key);
                    if (data) {
                        orders = JSON.parse(data);
                    }
                    orders.push(order);
                    localStorage.setItem(key, JSON.stringify(orders));
                } catch (e) {
                    console.error('Save order error:', e);
                }

                // ==========================================
                // ===== 4. ПОКАЗ УСПЕХА ПОКУПАТЕЛЮ =====
                // ==========================================

                document.getElementById('orderForm').classList.remove('active');
                document.getElementById('successBox').classList.add('active');

                const totalItems = order.items.reduce((sum, i) => sum + i.quantity, 0);
                document.getElementById('successMessage').innerHTML = `
                    <div style="font-size:16px;margin-bottom:10px;">
                        🎉 Заказ <b>№${orderId}</b> отправлен!
                    </div>
                    <div class="order-summary">
                        <div>📦 <b>${totalItems}</b> позиций на сумму <b>${order.total}₽</b></div>
                        <div style="margin-top:5px;font-size:14px;color:#aaa;">
                            📱 ${order.customer.phone}<br>
                            ⏰ ${order.customer.deliveryTime}
                        </div>
                    </div>
                    <div style="font-size:14px;color:#44ff44;margin-top:10px;">
                        ✅ Ожидайте звонка оператора!
                    </div>
                `;

                cart = [];
                updateCart();
                menuItems.forEach(item => updateQuantityDisplay(item.id));
                tg.HapticFeedback?.notificationOccurred('success');

            } catch (e) {
                console.error('Submit error:', e);
                showError('Ошибка: ' + e.message);
                tg.showAlert('❌ Произошла ошибка. Попробуйте еще раз.');
            }
        }

        // ============================================
        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        // ============================================
        function showError(message) {
            const box = document.getElementById('errorBox');
            const msg = document.getElementById('errorMessage');
            if (box && msg) {
                box.classList.add('active');
                msg.textContent = message;
                setTimeout(() => box.classList.remove('active'), 8000);
            }
        }

        function hideError() {
            document.getElementById('errorBox').classList.remove('active');
        }

        function hideSuccess() {
            document.getElementById('successBox').classList.remove('active');
            document.getElementById('cart').style.display = 'flex';
            updateCart();
        }

        function showDebug() {
            const debugEl = document.getElementById('debugInfo');
            if (debugEl) {
                debugEl.classList.toggle('active');
                if (debugEl.classList.contains('active')) {
                    debugEl.textContent = '=== ДИАГНОСТИКА ===\n';
                    debugEl.textContent += `Telegram WebApp: ${!!tg}\n`;
                    debugEl.textContent += `User: ${tg.initDataUnsafe?.user?.first_name || 'Не авторизован'}\n`;
                    debugEl.textContent += `User ID: ${tg.initDataUnsafe?.user?.id || 'Нет'}\n`;
                    debugEl.textContent += `ADMIN_CHAT_ID: ${ADMIN_CHAT_ID}\n`;
                    debugEl.textContent += `Меню: ${menuItems.length} позиций\n`;
                    debugEl.textContent += `Корзина: ${cart.length} товаров\n`;
                    debugEl.textContent += `Токен бота: ${BOT_TOKEN ? '✅ Установлен' : '❌ Не установлен'}\n`;
                    debugEl.textContent += `URL: ${window.location.href}\n`;
                    debugEl.textContent += `Время: ${new Date().toLocaleString()}`;
                }
            }
        }

        // ============================================
        // ===== ЗАПУСК =====
        // ============================================
        setTimeout(loadMenu, 500);

        console.log('✅ Приложение "Кафе Миас" запущено!');
        console.log('📨 Заказы приходят админу на ID:', ADMIN_CHAT_ID);
        console.log('📨 Покупатель получает уведомление');
        console.log('🔒 Админ-панель скрыта от клиентов');
        
        // ===== ПРОВЕРКА СВЯЗИ С БОТОМ =====
        // Проверяем может ли бот отправлять сообщения админу
        setTimeout(() => {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ADMIN_CHAT_ID,
                    text: '🤖 Бот запущен и готов принимать заказы!',
                    parse_mode: 'HTML'
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.ok) {
                    console.log('✅ Связь с ботом установлена!');
                } else {
                    console.error('❌ Ошибка связи с ботом:', data);
                    console.log('⚠️ Проверьте:');
                    console.log('1. Правильный ли ADMIN_CHAT_ID');
                    console.log('2. Написали ли вы боту первым');
                    console.log('3. Бот запущен?');
                }
            })
            .catch(err => {
                console.error('❌ Не удалось связаться с ботом:', err);
            });
        }, 3000);
    </script>
</body>
</html>
