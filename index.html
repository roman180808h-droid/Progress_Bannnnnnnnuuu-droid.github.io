<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кафе Миас — Меню</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background: linear-gradient(180deg, #0a0a0a 0%, #1a1108 100%); color: #ffffff; padding-bottom: 180px; }
        .header { text-align: center; padding: 20px 15px; background: linear-gradient(135deg, #3a1f0a 0%, #1a0f05 100%); border-bottom: 3px solid #ff5500; }
        .header h1 { font-size: 28px; font-weight: 800; color: #ffaa00; }
        .header p { font-size: 14px; color: #ffddaa; }
        
        .hero { height: 180px; background: url('https://picsum.photos/id/1080/800/400') center/cover; }
        .category { padding: 15px; }
        .category-title { font-size: 18px; font-weight: 700; color: #ffaa00; margin: 20px 0 12px; padding-left: 12px; border-left: 5px solid #ff5500; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; }
        .menu-item { background: #1f1b17; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .item-image { width: 100%; height: 120px; object-fit: cover; }
        .item-content { padding: 12px; }
        .item-title { font-size: 15px; font-weight: 600; }
        .item-desc { font-size: 12.5px; color: #aaa; margin-bottom: 8px; }
        .item-price { font-size: 17px; font-weight: 700; color: #ffaa00; }
        
        .add-btn { background: linear-gradient(135deg, #ff5500, #ff8800); color: white; border: none; padding: 10px; border-radius: 9999px; font-weight: 600; width: 100%; margin-top: 8px; }
        
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(26,17,8,0.98); backdrop-filter: blur(12px); border-top: 2px solid #ff5500; padding: 12px 15px; z-index: 1000; display: none; }
        .cart-btn { background: linear-gradient(135deg, #ff5500, #ffaa00); color: white; border: none; padding: 12px 24px; border-radius: 9999px; font-weight: 700; }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.92); display: none; z-index: 2000; align-items: flex-end; }
        .modal-content { background: #1a1108; width: 100%; max-height: 88vh; border-radius: 20px 20px 0 0; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 18px 20px; border-bottom: 1px solid #3a2a1f; display: flex; justify-content: space-between; }
        .close-modal { font-size: 28px; cursor: pointer; }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; }
        .cart-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #2a2520; }
        
        .order-form { padding: 15px; background: #120c07; }
        input, textarea { width: 100%; padding: 14px; background: #2a2520; border: 1px solid #444; border-radius: 12px; color: white; margin-bottom: 12px; }
        .send-order-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #ff5500, #ffaa00); color: white; border: none; border-radius: 12px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🍖 КАФЕ «МИАС»</h1>
        <p>Горячий шашлык • Вкусная шаурма</p>
    </div>
    <div class="hero"></div>

    <div class="category">
        <div class="category-title">🔥 Шаурма</div>
        <div class="menu-grid">
            <div class="menu-item">
                <img src="https://picsum.photos/id/292/400/300" class="item-image">
                <div class="item-content">
                    <div class="item-title">🌯 Шаурма Классическая</div>
                    <div class="item-desc">Свинина, овощи, фирменный соус</div>
                    <div class="item-price">250 ₽</div>
                    <button class="add-btn" onclick="addToCart(1, '🌯 Шаурма Классическая', 250)">В корзину</button>
                </div>
            </div>
            <div class="menu-item">
                <img src="https://picsum.photos/id/431/400/300" class="item-image">
                <div class="item-content">
                    <div class="item-title">🌯 Шаурма Куриная</div>
                    <div class="item-desc">Курица, овощи, соус</div>
                    <div class="item-price">240 ₽</div>
                    <button class="add-btn" onclick="addToCart(2, '🌯 Шаурма Куриная', 240)">В корзину</button>
                </div>
            </div>
        </div>
    </div>

    <div class="cart-bar" id="cartBar">
        <div class="cart-content">
            <div>
                <span style="color:#aaa">В корзине:</span> <span id="cartCount">0</span>
                <div id="totalSum" style="font-weight:700;font-size:18px;">0 ₽</div>
            </div>
            <button class="cart-btn" onclick="showCartModal()">Оформить заказ</button>
        </div>
    </div>

    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🛒 Ваша корзина</h3>
                <div class="close-modal" onclick="hideCartModal()">✕</div>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <div class="order-form">
                <input type="tel" id="userPhone" placeholder="+7 (___) ___-__-__">
                <textarea id="userComment" rows="2" placeholder="Комментарий к заказу (адрес, время...)"></textarea>
                <button class="send-order-btn" onclick="sendOrder()">✅ Отправить заказ</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const BOT_TOKEN = "8980208297:AAGm8N55yZ-RN5ao_uxCoFHYLiSHq1eyfss";
        const CHAT_ID = -5463348298;

        let cart = {};

        function addToCart(id, title, price) {
            if (!cart[id]) cart[id] = {id, title, price, count: 1};
            else cart[id].count++;
            updateCartUI();
        }

        function changeQuantity(id, delta) {
            if (!cart[id]) return;
            cart[id].count += delta;
            if (cart[id].count <= 0) delete cart[id];
            updateCartUI();
        }

        function updateCartUI() {
            let total = 0, count = 0;
            Object.values(cart).forEach(item => {
                total += item.price * item.count;
                count += item.count;
            });
            document.getElementById('totalSum').textContent = total + ' ₽';
            document.getElementById('cartCount').textContent = count;
            document.getElementById('cartBar').style.display = count > 0 ? 'block' : 'none';
        }

        function showCartModal() {
            const container = document.getElementById('cartItems');
            container.innerHTML = '';
            if (Object.keys(cart).length === 0) {
                container.innerHTML = `<div class="empty-cart">Корзина пуста 😢</div>`;
            } else {
                Object.values(cart).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.innerHTML = `
                        <div style="flex:1">
                            <div style="font-weight:600">${item.title}</div>
                            <div style="color:#aaa">${item.price} ₽ × ${item.count}</div>
                        </div>
                        <div style="display:flex;align-items:center;background:#2a2520;border-radius:9999px;padding:4px;">
                            <button onclick="changeQuantity(${item.id},-1)" style="width:32px;height:32px;background:#ff5500;color:white;border:none;border-radius:50%;">–</button>
                            <span style="padding:0 12px;font-weight:700;">${item.count}</span>
                            <button onclick="changeQuantity(${item.id},1)" style="width:32px;height:32px;background:#ff5500;color:white;border:none;border-radius:50%;">+</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }
            document.getElementById('cartModal').style.display = 'flex';
        }

        function hideCartModal() {
            document.getElementById('cartModal').style.display = 'none';
        }

        async function sendOrder() {
            const phone = document.getElementById('userPhone').value.trim();
            if (!phone) {
                alert("Введите номер телефона!");
                return;
            }

            let total = 0;
            let text = "Новый заказ в Кафе Миас\n\n";
            text += "Клиент: " + (tg.initDataUnsafe?.user?.first_name || "Клиент") + "\n";
            if (tg.initDataUnsafe?.user?.username) text += "Username: @" + tg.initDataUnsafe.user.username + "\n";
            text += "Телефон: " + phone + "\n\n";
            text += "Состав заказа:\n";

            Object.values(cart).forEach(item => {
                const sum = item.price * item.count;
                text += item.title + " x" + item.count + " — " + sum + " руб.\n";
                total += sum;
            });

            text += "\nИтого: " + total + " руб.";

            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text
                        // parse_mode полностью удалён
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("✅ Заказ успешно отправлен!");
                    cart = {};
                    updateCartUI();
                    hideCartModal();
                    setTimeout(() => tg.close(), 1500);
                } else {
                    alert("❌ Ошибка: " + (data.description || "Неизвестная ошибка"));
                    console.log(data);
                }
            } catch (e) {
                alert("Ошибка соединения");
                console.error(e);
            }
        }

        window.onload = updateCartUI;
    </script>
</body>
</html>
