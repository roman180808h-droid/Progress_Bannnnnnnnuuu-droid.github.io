<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Магазин банных печей - VK бот</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Georgia',serif;background:linear-gradient(135deg,#2c1810,#8b4513);padding:20px;min-height:100vh;}
        h1{text-align:center;color:#ffd700;margin-bottom:10px;font-size:2.5em;}
        .subtitle{text-align:center;color:#ffecb3;margin-bottom:30px;}
        .pechka-list{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;max-width:1200px;margin:0 auto;}
        .pechka-card{background:white;border-radius:15px;padding:20px;width:300px;border:2px solid #d35400;}
        .pechka-card img{width:100%;border-radius:10px;height:200px;object-fit:cover;}
        .pechka-card h3{color:#d35400;margin:10px 0;text-align:center;}
        .price{font-size:22px;font-weight:bold;color:#c0392b;text-align:center;margin:10px 0;}
        .add-to-cart{width:100%;padding:10px;background:#d35400;color:white;border:none;border-radius:8px;cursor:pointer;}
        .cart-section{margin-top:40px;background:white;border-radius:20px;padding:20px;max-width:600px;margin:40px auto;}
        .cart-section h2{color:#d35400;text-align:center;}
        .cart-item{background:#fff9f0;padding:10px;border-radius:8px;display:flex;justify-content:space-between;margin-bottom:10px;}
        .total{text-align:right;font-size:20px;font-weight:bold;margin-top:15px;padding-top:10px;border-top:2px solid #d35400;}
        .order-form{margin-top:20px;padding:20px;background:#fff8f0;border-radius:15px;}
        .order-form input,.order-form textarea{width:100%;padding:8px;margin:8px 0;border:1px solid #ddd;border-radius:5px;}
        .send-btn{width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
        .empty-cart{text-align:center;color:#999;padding:20px;}
    </style>
</head>
<body>

    <h1>🔥 Печи для бани и сауны 🔥</h1>
    <div class="subtitle">Каменные печи от производителя</div>

    <div class="pechka-list" id="pechkaList"></div>

    <div class="cart-section">
        <h2>🛍️ Корзина</h2>
        <div id="cartItems" class="cart-items">
            <div class="empty-cart">Корзина пуста</div>
        </div>
        <div class="total">💰 Итого: <span id="totalSum">0</span> ₽</div>
        
        <div class="order-form" id="orderForm" style="display:none;">
            <h3>📝 Оформление заказа</h3>
            <input type="text" id="customerName" placeholder="Ваше имя *">
            <input type="email" id="customerEmail" placeholder="Email *">
            <input type="tel" id="customerPhone" placeholder="Телефон *">
            <textarea id="customerAddress" placeholder="Адрес доставки"></textarea>
            <textarea id="customerComment" placeholder="Комментарий"></textarea>
            <button class="send-btn" id="sendOrderBtn">📨 Отправить заказ в VK</button>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ VK БОТА ==========
        const VK_TOKEN = "vk1.a.0DQBqpISUv3PJvHyjDBuVe_Ulv6qah9H7NPINEDa2sheTcLHAd3PleyS4GM-Jf4VOzNaB79r6hWXV1SGJcPo3b_eIWU9mjNahPpXADzO1vnE7ad3B72fAUSUYGXdoQa519XQ7DtSJJZ9vffH2s2-pBXEWIefmkGkdRPGw4aUJrMcQ99i1COIQDV_sQFMIOgc9x145MRPlzWS-2G26jvuAA";
        const VK_USER_ID = "ВАШ_ID_ВКОНТАКТЕ";  // ← ВСТАВЬТЕ ВАШ ID СЮДА!

        // Данные печей
        const pechki = [
            { id: 1, name: "Печь 'Жар-Печь' Каменка", price: 28900, specs: "🏠 Отапливает: до 18 м² | 🪵 Расход дров: 4-6 кг/час", img: "https://placehold.co/400x300/d35400/white?text=Жар-Печь" },
            { id: 2, name: "Печь 'Сударушка'", price: 35900, specs: "🏠 Отапливает: до 24 м² | 🪵 Расход дров: 5-7 кг/час", img: "https://placehold.co/400x300/e67e22/white?text=Сударушка" },
            { id: 3, name: "Печь 'Термофор' Гефест", price: 42500, specs: "🏠 Отапливает: до 30 м² | 🪵 Расход дров: 6-9 кг/час", img: "https://placehold.co/400x300/27ae60/white?text=Гефест" },
            { id: 4, name: "Печь 'Варвара' Чугунная", price: 19800, specs: "🏠 Отапливает: до 12 м² | 🪵 Расход дров: 3-5 кг/час", img: "https://placehold.co/400x300/3498db/white?text=Варвара" },
            { id: 5, name: "Печь 'Ферингер' Бавария", price: 58900, specs: "🏠 Отапливает: до 35 м² | 🪵 Расход дров: 7-10 кг/час", img: "https://placehold.co/400x300/9b59b6/white?text=Ферингер" },
            { id: 6, name: "Печь 'Ермак' Банная", price: 24900, specs: "🏠 Отапливает: до 16 м² | 🪵 Расход дров: 4-6 кг/час", img: "https://placehold.co/400x300/1abc9c/white?text=Ермак" },
            { id: 7, name: "Печь 'Сибирь' Камин-печь", price: 45900, specs: "🏠 Отапливает: до 28 м² | 🪵 Расход дров: 6-8 кг/час", img: "https://placehold.co/400x300/c0392b/white?text=Сибирь" },
            { id: 8, name: "Печь 'Русская банька'", price: 31900, specs: "🏠 Отапливает: до 20 м² | 🪵 Расход дров: 5-7 кг/час", img: "https://placehold.co/400x300/f39c12/white?text=Русская" }
        ];

        let cart = [];

        function showPechki() {
            const container = document.getElementById('pechkaList');
            container.innerHTML = '';
            pechki.forEach(pechka => {
                const card = document.createElement('div');
                card.className = 'pechka-card';
                card.innerHTML = `
                    <img src="${pechka.img}" alt="${pechka.name}">
                    <h3>${pechka.name}</h3>
                    <div class="specs">${pechka.specs}</div>
                    <div class="price">${pechka.price.toLocaleString('ru-RU')} ₽</div>
                    <button class="add-to-cart" onclick="addToCart(${pechka.id})">🛒 В корзину</button>
                `;
                container.appendChild(card);
            });
        }

        function addToCart(id) {
            const pechka = pechki.find(p => p.id === id);
            if (pechka) {
                cart.push(pechka);
                updateCart();
                alert(`✓ ${pechka.name} добавлена в корзину!`);
            }
        }

        function updateCart() {
            const container = document.getElementById('cartItems');
            const totalSpan = document.getElementById('totalSum');
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-cart">Корзина пуста</div>';
                totalSpan.textContent = '0';
                document.getElementById('orderForm').style.display = 'none';
                return;
            }
            
            let total = 0;
            container.innerHTML = '';
            cart.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span><strong>${item.name}</strong> - ${item.price.toLocaleString('ru-RU')} ₽</span><button onclick="removeFromCart(${idx})" style="background:#c0392b;color:white;border:none;border-radius:5px;padding:5px 10px;cursor:pointer;">Удалить</button>`;
                container.appendChild(div);
                total += item.price;
            });
            totalSpan.textContent = total.toLocaleString('ru-RU');
            document.getElementById('orderForm').style.display = 'block';
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        // Отправка заказа в VK
        async function sendOrder() {
            const name = document.getElementById('customerName').value.trim();
            const email = document.getElementById('customerEmail').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value;
            const comment = document.getElementById('customerComment').value;
            
            if (!name || !email || !phone) {
                alert('❌ Заполните имя, email и телефон!');
                return;
            }
            
            if (cart.length === 0) {
                alert('❌ Корзина пуста!');
                return;
            }
            
            let items = '';
            let total = 0;
            cart.forEach(item => {
                items += `${item.name} - ${item.price.toLocaleString('ru-RU')} ₽\n`;
                total += item.price;
            });
            
            const message = `🔥 НОВЫЙ ЗАКАЗ! 🔥\n\n👤 Имя: ${name}\n📧 Email: ${email}\n📞 Телефон: ${phone}\n🏠 Адрес: ${address || 'Не указан'}\n\n📦 Заказ:\n${items}\n💰 Итого: ${total.toLocaleString('ru-RU')} ₽\n💬 Комментарий: ${comment || 'Нет'}`;
            
            try {
                const response = await fetch(`https://api.vk.com/method/messages.send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        access_token: VK_TOKEN,
                        user_id: VK_USER_ID,
                        message: message,
                        v: '5.131',
                        random_id: Date.now()
                    })
                });
                
                const result = await response.json();
                
                if (result.response) {
                    alert('✅ Заказ отправлен! Мы свяжемся с вами!');
                    cart = [];
                    updateCart();
                    document.getElementById('customerName').value = '';
                    document.getElementById('customerEmail').value = '';
                    document.getElementById('customerPhone').value = '';
                    document.getElementById('customerAddress').value = '';
                    document.getElementById('customerComment').value = '';
                } else {
                    alert('❌ Ошибка: ' + (result.error?.error_msg || 'Неизвестная ошибка'));
                }
            } catch(error) {
                alert('❌ Ошибка отправки! Проверьте интернет');
            }
        }

        showPechki();
        document.getElementById('sendOrderBtn').onclick = sendOrder;
    </script>
</body>
</html>
