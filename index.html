<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кафе Миас — Меню</title>
    <script src="https://telegram.org"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0d0d0d; color: #ffffff; padding: 15px; padding-bottom: 180px; }
        .header { text-align: center; margin-bottom: 20px; padding: 15px 10px; background: linear-gradient(135deg, #261105 0%, #110702 100%); border-radius: 14px; border: 1px solid #3d1b08; }
        .header h1 { font-size: 24px; color: #ffaa00; }
        .header p { font-size: 12px; color: #b3b3b3; margin-top: 4px; }
        .category-title { font-size: 16px; font-weight: 800; color: #ffaa00; margin: 20px 0 10px 5px; text-transform: uppercase; border-left: 4px solid #ff5500; padding-left: 10px; }
        
        .menu-item { background-color: #161616; border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #262626; }
        .item-info { flex: 1; padding-right: 10px; }
        .item-title { font-size: 15px; font-weight: 700; }
        .item-desc { font-size: 12px; color: #8c8c8c; margin-bottom: 6px; line-height: 1.3; }
        .item-price { font-size: 15px; color: #ffaa00; font-weight: 800; }
        
        .counter-container { display: flex; align-items: center; background-color: #262626; border-radius: 8px; overflow: hidden; }
        .count-btn { background-color: #ff5500; color: white; border: none; width: 32px; height: 32px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .item-count { width: 30px; text-align: center; font-size: 14px; font-weight: bold; }
        .add-initial-btn { background: linear-gradient(135deg, #ff5500 0%, #ff8800 100%); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; }

        .order-bar { position: fixed; bottom: 0; left: 0; right: 0; background-color: rgba(22, 22, 22, 0.98); backdrop-filter: blur(10px); padding: 15px; border-top: 1px solid #2d2d2d; display: none; z-index: 9999; }
        .phone-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background-color: #111; color: white; font-size: 14px; margin-bottom: 10px; text-align: center; }
        .phone-input:focus { border-color: #ffaa00; outline: none; }
        .order-btn { width: 100%; background: linear-gradient(135deg, #ff5500 0%, #ffaa00 100%); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>КАФЕ «МИАС»</h1>
        <p>Горячий шашлык и свежая шаурма</p>
    </div>

    <div class="category-title">Мясо на углях & Шаурма</div>
    
    <div class="menu-item">
        <div class="item-info">
            <div class="item-title">🌯 Шаурма Классическая</div>
            <div class="item-desc">Мясо, томаты, огурцы, капуста, соус.</div>
            <div class="item-price">250 ₽</div>
        </div>
        <div id="controls-shaurma">
            <button class="add-initial-btn" onclick="initItem('shaurma', '🌯 Шаурма Классическая', 250)">Добавить</button>
        </div>
    </div>

    <div class="menu-item">
        <div class="item-info">
            <div class="item-title">🥩 Шашлык из свинины</div>
            <div class="item-desc">Сочная свиная шея, лук, соус. 200г.</div>
            <div class="item-price">380 ₽</div>
        </div>
        <div id="controls-shashlyk">
            <button class="add-initial-btn" onclick="initItem('shashlyk', '🥩 Шашлык из свинины', 380)">Добавить</button>
        </div>
    </div>

    <div class="menu-item">
        <div class="item-info">
            <div class="item-title">🥤 Кола (0.5л)</div>
            <div class="item-desc">Освежающий газированный напиток.</div>
            <div class="item-price">90 ₽</div>
        </div>
        <div id="controls-cola">
            <button class="add-initial-btn" onclick="initItem('cola', '🥤 Кола (0.5л)', 90)">Добавить</button>
        </div>
    </div>

    <div class="order-bar" id="orderBar">
        <input type="tel" id="userPhone" class="phone-input" placeholder="+7 (999) 000-00-00">
        <button class="order-btn" id="orderBtn" onclick="sendOrder()">Отправить заказ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const BOT_TOKEN = "8980208297:AAGm8N55yZ-RN5ao_uxCMMRofMivR6m2p4k"; 
        const chat_id = 2013568102; // Твой личный ID аккаунта

        let cart = {};
        let totalSum = 0;

        function initItem(id, title, price) {
            cart[id] = { title: title, price: price, count: 1 };
            updateControls(id);
            calculateTotal();
        }

        function changeCount(id, delta) {
            if (!cart[id]) return;
            cart[id].count += delta;
            if (cart[id].count <= 0) {
                delete cart[id];
                const originalTitle = id === 'shaurma' ? '🌯 Шаурма Классическая' : id === 'shashlyk' ? '🥩 Шашлык из свинины' : '🥤 Кола (0.5л)';
                const originalPrice = id === 'shaurma' ? 250 : id === 'shashlyk' ? 380 : 90;
                document.getElementById(`controls-${id}`).innerHTML = `<button class="add-initial-btn" onclick="initItem('${id}', '${originalTitle}', ${originalPrice})">Добавить</button>`;
            } else {
                document.getElementById(`count-${id}`).textContent = cart[id].count;
            }
            calculateTotal();
        }

        function updateControls(id) {
            document.getElementById(`controls-${id}`).innerHTML = `
                <div class="counter-container">
                    <button class="count-btn" onclick="changeCount('${id}', -1)">-</button>
                    <div class="item-count" id="count-${id}">1</div>
                    <button class="count-btn" onclick="changeCount('${id}', 1)">+</button>
                </div>
            `;
        }

        function calculateTotal() {
            totalSum = 0;
            let hasItems = false;
            for (let id in cart) {
                totalSum += cart[id].price * cart[id].count;
                hasItems = true;
            }
            document.getElementById("orderBar").style.display = hasItems ? "block" : "none";
            document.getElementById("orderBtn").textContent = `Заказать: ${totalSum} ₽`;
        }

        function sendOrder() {
            const phone = document.getElementById("userPhone").value.trim();
            if (!phone) {
                tg.showAlert("Пожалуйста, введите ваш номер телефона для связи!");
                return;
            }

            const user = tg.initDataUnsafe?.user;
            let message = `📥 **НОВЫЙ ПРЕДЗАКАЗ КАФЕ МИАС**\n\n`;
            message += `👤 **Клиент:** ${user?.first_name || 'Не указано'} ${user?.last_name || ''}\n`;
            message += `📱 **Телефон:** ${phone}\n`;
            if (user?.username) message += `✉️ **Юзернейм:** @${user.username}\n`;
            message += `\n📋 **Состав заказа:**\n`;
            
            let i = 1;
            for (let id in cart) {
                message += `${i}. ${cart[id].title} x${cart[id].count} — ${cart[id].price * cart[id].count} ₽\n`;
                i++;
            }
            message += `\n💰 **ИТОГО К ОПЛАТЕ:** ${totalSum} ₽`;

            fetch(`https://telegram.org{BOT_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chat_id, text: message, parse_mode: "Markdown" })
            })
            .then(res => {
                if (res.ok) {
                    tg.showAlert("✅ Заказ успешно оформлен! Чек отправлен владельцу.");
                    tg.close();
                } else {
                    tg.showAlert("Ошибка отправки.");
                }
            })
            .catch(() => tg.showAlert("Ошибка сети."));
        }
    </script>
</body>
</html>
