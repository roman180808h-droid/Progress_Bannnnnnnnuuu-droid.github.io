<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Банные чаны из нержавейки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Georgia', serif;
            background: #f5ede2;
            padding: 30px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #b45a2b;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #7e6856;
            margin-bottom: 40px;
        }
        .dropdown-container {
            max-width: 500px;
            margin: 0 auto 30px;
            position: relative;
        }
        .dropdown-btn {
            width: 100%;
            background: #d97a2b;
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #dccdbd;
            z-index: 100;
            margin-top: 5px;
        }
        .dropdown-content.show {
            display: block;
        }
        .dropdown-item {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .dropdown-item:hover {
            background: #fef3e9;
        }
        .dropdown-item h4 {
            color: #a55826;
        }
        .dropdown-item .price-drop {
            font-weight: bold;
            color: #b45a2b;
            margin-top: 5px;
        }
        .product-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            max-width: 700px;
            margin: 20px auto;
            display: none;
            border: 1px solid #eadbcb;
        }
        .product-card.show {
            display: block;
        }
        .product-card img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 20px;
            background: #fef9f2;
            margin-bottom: 20px;
        }
        .product-card h2 {
            text-align: center;
            color: #9b4f23;
            margin-bottom: 15px;
        }
        .specs {
            background: #fef8f2;
            padding: 15px;
            border-radius: 20px;
            margin: 15px 0;
            line-height: 1.6;
        }
        .price {
            font-size: 28px;
            font-weight: bold;
            color: #bc631c;
            text-align: center;
            margin: 15px 0;
        }
        .add-to-cart, .send-btn {
            background: #d97a2b;
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .cart-section {
            background: white;
            border-radius: 30px;
            padding: 20px;
            max-width: 700px;
            margin: 40px auto;
        }
        .cart-item {
            background: #fef8f2;
            padding: 12px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .remove-item {
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 5px 15px;
            cursor: pointer;
        }
        .total {
            text-align: right;
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
        }
        .empty-cart {
            text-align: center;
            color: #aa8f72;
            padding: 20px;
        }
        .order-form {
            margin-top: 25px;
            display: none;
        }
        .order-form input, .order-form textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 40px;
            border: 1px solid #d9c7b4;
        }
        .success-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🛢️ Банные чаны из нержавейки</h1>
    <div class="subtitle">Надёжные, долговечные чаны для настоящей парной</div>

    <div class="dropdown-container">
        <button class="dropdown-btn" id="dropdownBtn">📋 Выбрать чан ▼</button>
        <div class="dropdown-content" id="dropdownContent"></div>
    </div>

    <div id="productCard" class="product-card">
        <img id="cardImage" src="" alt="Чан">
        <h2 id="cardName"></h2>
        <div class="specs" id="cardSpecs"></div>
        <div class="price" id="cardPrice"></div>
        <button class="add-to-cart" id="addToCartBtn">➕ Добавить в корзину</button>
    </div>

    <div class="cart-section">
        <h2>🛒 Корзина</h2>
        <div id="cartItems"><div class="empty-cart">Пока пусто</div></div>
        <div class="total">💰 Итого: <span id="totalSum">0</span> ₽</div>
        <div class="order-form" id="orderForm">
            <h3>Оформление заказа</h3>
            <input type="text" id="userName" placeholder="Ваше имя *">
            <input type="email" id="userEmail" placeholder="Email *">
            <input type="tel" id="userPhone" placeholder="Телефон *">
            <textarea id="userAddress" placeholder="Адрес доставки" rows="2"></textarea>
            <button class="send-btn" id="sendOrderBtn">📨 Отправить заказ в Telegram</button>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = "8765410107:AAGkrWF4g0XzQzdUyYAOcX7DS019zGjmSBA";
    const CHAT_ID = "2013568102";

    // ========== ТОЛЬКО БАННЫЕ ЧАНЫ ИЗ НЕРЖАВЕЙКИ ==========
    const products = [
        { 
            id: 1, 
            name: "Банный чан 100 л, нержавейка", 
            price: 12500, 
            specs: "💧 Объём: 100 литров<br>📐 Размеры: 600×600×400 мм<br>🔩 Материал: нержавеющая сталь<br>📏 Толщина: 1 мм<br>🛢️ Пищевая нержавейка, не ржавеет<br>🧼 Легко моется, долговечный<br>⚙️ Подходит для дровяных печей",
            img: "https://placehold.co/600x450/e8cfb0/white?text=Чан+100л"
        },
        { 
            id: 2, 
            name: "Банный чан 150 л, нержавейка", 
            price: 16500, 
            specs: "💧 Объём: 150 литров<br>📐 Размеры: 700×700×450 мм<br>🔩 Материал: нержавеющая сталь<br>📏 Толщина: 1 мм<br>🛢️ Пищевая нержавейка, не ржавеет<br>🧼 Легко моется, долговечный<br>⚙️ Оптимальный размер для семьи",
            img: "https://placehold.co/600x450/e8cfb0/white?text=Чан+150л"
        },
        { 
            id: 3, 
            name: "Банный чан 200 л, нержавейка", 
            price: 19500, 
            specs: "💧 Объём: 200 литров<br>📐 Размеры: 800×800×500 мм<br>🔩 Материал: нержавеющая сталь<br>📏 Толщина: 1.2 мм<br>🛢️ Пищевая нержавейка, не ржавеет<br>🧼 Легко моется, долговечный<br>⚙️ Утолщённая стенка для надёжности",
            img: "https://placehold.co/600x450/e8cfb0/white?text=Чан+200л"
        },
        { 
            id: 4, 
            name: "Банный чан 250 л, нержавейка", 
            price: 24500, 
            specs: "💧 Объём: 250 литров<br>📐 Размеры: 900×900×550 мм<br>🔩 Материал: нержавеющая сталь<br>📏 Толщина: 1.2 мм<br>🛢️ Пищевая нержавейка, не ржавеет<br>🧼 Легко моется, долговечный<br>⚙️ Для большой компании",
            img: "https://placehold.co/600x450/e8cfb0/white?text=Чан+250л"
        },
        { 
            id: 5, 
            name: "Банный чан 300 л, нержавейка", 
            price: 28500, 
            specs: "💧 Объём: 300 литров<br>📐 Размеры: 1000×1000×600 мм<br>🔩 Материал: нержавеющая сталь<br>📏 Толщина: 1.5 мм<br>🛢️ Пищевая нержавейка, не ржавеет<br>🧼 Легко моется, долговечный<br>⚙️ Максимальная прочность и вместительность",
            img: "https://placehold.co/600x450/e8cfb0/white?text=Чан+300л"
        }
    ];

    let cart = [];
    let currentProduct = null;

    function showMessage(msg, isErr) {
        let div = document.createElement('div');
        div.className = 'success-msg';
        div.textContent = msg;
        if(isErr) div.style.background = "#c0392b";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    function loadDropdown() {
        let html = '';
        for(let p of products) {
            html += `<div class="dropdown-item" onclick="selectProduct(${p.id})">
                        <h4>🛢️ ${p.name}</h4>
                        <div class="price-drop">${p.price.toLocaleString('ru-RU')} ₽</div>
                    </div>`;
        }
        document.getElementById('dropdownContent').innerHTML = html;
    }

    function selectProduct(id) {
        currentProduct = products.find(p => p.id === id);
        document.getElementById('productCard').classList.add('show');
        document.getElementById('cardImage').src = currentProduct.img;
        document.getElementById('cardName').innerText = currentProduct.name;
        document.getElementById('cardSpecs').innerHTML = currentProduct.specs;
        document.getElementById('cardPrice').innerHTML = `💰 ${currentProduct.price.toLocaleString('ru-RU')} ₽`;
        document.getElementById('dropdownContent').classList.remove('show');
    }

    function updateCart() {
        let container = document.getElementById('cartItems');
        let totalSpan = document.getElementById('totalSum');
        if(cart.length === 0) {
            container.innerHTML = '<div class="empty-cart">Корзина пуста</div>';
            totalSpan.innerText = '0';
            document.getElementById('orderForm').style.display = 'none';
            return;
        }
        let total = 0;
        let html = '';
        for(let i = 0; i < cart.length; i++) {
            html += `<div class="cart-item">
                        <span><strong>${cart[i].name}</strong> — ${cart[i].price.toLocaleString('ru-RU')} ₽</span>
                        <button class="remove-item" onclick="removeFromCart(${i})">Удалить</button>
                    </div>`;
            total += cart[i].price;
        }
        container.innerHTML = html;
        totalSpan.innerText = total.toLocaleString('ru-RU');
        document.getElementById('orderForm').style.display = 'block';
    }

    function removeFromCart(idx) {
        cart.splice(idx, 1);
        updateCart();
        showMessage('🗑 Товар удалён из корзины');
    }

    function addToCart() {
        if(!currentProduct) {
            showMessage('❌ Сначала выберите товар', true);
            return;
        }
        cart.push({ name: currentProduct.name, price: currentProduct.price });
        updateCart();
        showMessage(`✓ ${currentProduct.name} добавлен в корзину`);
    }

    async function sendOrder() {
        let name = document.getElementById('userName').value.trim();
        let email = document.getElementById('userEmail').value.trim();
        let phone = document.getElementById('userPhone').value.trim();
        let address = document.getElementById('userAddress').value;

        if(!name || !email || !phone) {
            showMessage('❌ Заполните имя, email и телефон', true);
            return;
        }
        if(cart.length === 0) {
            showMessage('❌ Корзина пуста', true);
            return;
        }

        let items = '';
        let total = 0;
        for(let it of cart) {
            items += `${it.name} — ${it.price.toLocaleString('ru-RU')} ₽\n`;
            total += it.price;
        }
        let msg = `🛢️ НОВЫЙ ЗАКАЗ (чаны)!\n\n👤 Имя: ${name}\n📧 Email: ${email}\n📞 Телефон: ${phone}\n🏠 Адрес: ${address || 'не указан'}\n\n📦 Заказ:\n${items}\n💰 ИТОГО: ${total.toLocaleString('ru-RU')} ₽`;
        
        try {
            let res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
            });
            let json = await res.json();
            if(json.ok) {
                showMessage('✅ Заказ отправлен в Telegram!');
                cart = [];
                updateCart();
                document.getElementById('userName').value = '';
                document.getElementById('userEmail').value = '';
                document.getElementById('userPhone').value = '';
                document.getElementById('userAddress').value = '';
            } else {
                showMessage('⚠️ Ошибка, но заказ сохранён. Свяжитесь с нами', true);
            }
        } catch(e) {
            showMessage('⚠️ Ошибка соединения (включите VPN для отправки в Telegram)', true);
        }
    }

    document.getElementById('dropdownBtn').onclick = () => {
        document.getElementById('dropdownContent').classList.toggle('show');
    };
    document.getElementById('addToCartBtn').onclick = addToCart;
    document.getElementById('sendOrderBtn').onclick = sendOrder;

    loadDropdown();
</script>
</body>
</html>
