<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ТЕРМОГРАД - Банные печи, котлы и чаны</title>
    <style>

        h1{text-align:center;color:#b45a2b;margin-bottom:10px;font-size:2.2rem;}
        h1 span{color:#d97a2b;font-weight:bold;}
        .subtitle{text-align:center;color:#7e6856;margin-bottom:40px;}

        /* Панель фильтров */
        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 0 auto 30px auto;
            max-width: 900px;
        }
        .search-input {
            flex: 3;
            min-width: 200px;
            padding: 12px 20px;
            border: 1px solid #dccdbd;
            border-radius: 50px;
            font-size: 16px;
            font-family: inherit;
            background: white;
        }
        .sort-select, .shape-filter {
            flex: 1;
            min-width: 160px;
            padding: 12px 20px;
            border: 1px solid #dccdbd;
            border-radius: 50px;
            font-size: 16px;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }

        .dropdown-container{max-width:500px;margin:0 auto 30px;position:relative;}
        .dropdown-btn{width:100%;background:#d97a2b;color:white;padding:14px 20px;border:none;border-radius:50px;font-size:16px;cursor:pointer;text-align:left;}
        .dropdown-content{display:none;position:absolute;top:100%;left:0;right:0;background:white;border-radius:20px;max-height:300px;overflow-y:auto;border:1px solid #dccdbd;z-index:100;margin-top:5px;}
        .dropdown-content.show{display:block;}
        .dropdown-item{padding:12px 15px;border-bottom:1px solid #eee;cursor:pointer;transition:all 0.2s;}
        .dropdown-item:hover{background:#fef3e9;}
        .dropdown-item.selected{background:#d97a2b;color:white;}
        .dropdown-item.selected h4{color:white;}
        .dropdown-item.selected .price-drop{color:#ffd700;}
        .dropdown-item h4{color:#a55826;}
        .dropdown-item .price-drop{font-weight:bold;color:#b45a2b;margin-top:5px;}

        .product-card{background:white;border-radius:30px;padding:25px;max-width:700px;margin:20px auto;display:none;border:1px solid #eadbcb;}
        .product-card.show{display:block;}
        .product-card img{width:100%;max-height:300px;object-fit:contain;border-radius:20px;background:#fef9f2;margin-bottom:20px;image-orientation:from-image;}
        .product-card h2{text-align:center;color:#9b4f23;margin-bottom:15px;}
        .specs{background:#fef8f2;padding:15px;border-radius:20px;margin:15px 0;line-height:1.6;}
        .price{font-size:28px;font-weight:bold;color:#bc631c;text-align:center;margin:15px 0;}
        .addons{background:#fdf8f1;border-radius:20px;padding:10px;margin-top:15px;}
        .addon-item{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;margin:5px 0;background:white;border-radius:50px;border:1px solid #eadbcb;}
        .addon-name{flex:2;font-weight:500;}
        .addon-price{flex:1;color:#bd631e;font-weight:500;}
        .addon-controls{display:flex;gap:10px;align-items:center;}
        .addon-controls button{width:30px;height:30px;border-radius:50%;border:none;background:#d97a2b;color:white;font-size:18px;cursor:pointer;}
        .addon-controls button:hover{background:#c06622;}
        .addon-count{font-weight:bold;min-width:30px;text-align:center;}
        .add-to-cart,.send-btn{background:#d97a2b;color:white;width:100%;padding:14px;border:none;border-radius:50px;font-size:16px;cursor:pointer;margin-top:20px;}
        .cart-section{background:white;border-radius:30px;padding:20px;max-width:700px;margin:40px auto;}
        .cart-item{background:#fef8f2;padding:12px;border-radius:50px;display:flex;justify-content:space-between;margin-bottom:10px;}
        .remove-item{background:#c0392b;color:white;border:none;border-radius:30px;padding:5px 15px;cursor:pointer;}
        .total{text-align:right;font-size:20px;font-weight:bold;margin-top:15px;}
        .empty-cart{text-align:center;color:#aa8f72;padding:20px;}
        .order-form{margin-top:25px;display:none;}
        .order-form input,.order-form textarea{width:100%;padding:10px;margin:8px 0;border-radius:40px;border:1px solid #d9c7b4;}
        .success-msg{position:fixed;bottom:20px;right:20px;background:#27ae60;color:white;padding:10px 20px;border-radius:30px;z-index:1000;animation:fadeOut 3s forwards;}
        @keyframes fadeOut{0%{opacity:1;}70%{opacity:1;}100%{opacity:0;visibility:hidden;}}
        .contacts-footer{text-align:center;margin-top:40px;padding:20px;background:#e8d9ca;border-radius:20px;}
        .contacts-footer a{color:#b45a2b;text-decoration:none;}
        .contacts-footer a:hover{text-decoration:underline;}

            <option value="price-desc">💰 Сначала дорогие</option>
        </select>
        <select id="shapeFilter" class="shape-filter">
            <option value="all">🎨 Все печи</option>
            <option value="round">🔴 Круглые (из трубы)</option>
            <option value="rect">🟦 Прямоугольные (листовые)</option>
        </select>
    </div>

    <div class="dropdown-container">
        <button class="dropdown-btn" id="dropdownBtn">📋 Выбрать товар ▼</button>
        <div class="dropdown-content" id="dropdownContent"></div>
    </div>

    <div id="productCard" class="product-card">

        <div class="specs" id="cardSpecs"></div>
        <div class="price" id="cardPrice"></div>
        <div id="addonsBlock"></div>
        <button class="add-to-cart" id="addToCartBtn">➕ Добавить в корзину</button>
    </div>

    <div class="cart-section">

        <div class="total">💰 Итого: <span id="totalSum">0</span> ₽</div>

            <input type="email" id="userEmail" placeholder="Email *">
            <input type="tel" id="userPhone" placeholder="Телефон *">
            <textarea id="userAddress" placeholder="Адрес доставки" rows="2"></textarea>
            <button class="send-btn" id="sendOrderBtn">📨 Отправить заказ</button>
        </div>
    </div>
</div>

        {id:90, name:"Банный чан «Макси» Aisi430 (техническая)", price:290000, type:null, specs:"💧 Объём: 2900 л<br>👥 Вместимость: 6-8 человек<br>📐 Ширина: 250 см<br>🔩 Материал: Aisi430 (техническая нержавейка)<br>🔥 Топка: чёрный металл 3 мм<br>🪜 Лестница с перилами, антискользящее покрытие<br>🛢️ Крышка, дымоход в комплекте<br>⚡ Быстрый нагрев, конструкция «Котёл»", img:"https://i.ibb.co/rfz73jSP/image.jpg", hasAddons:false}
    ];

    // ========== ДОПЫ ==========
    const addonsList = [
        {id:"b1", name:"Бак нерж 65 л, 1 мм", price:9500},
        {id:"b2", name:"Бак нерж 65 л, 1.5 мм", price:12500},
        {id:"b3", name:"Бак нерж 85 л, 1 мм", price:13500},
        {id:"b4", name:"Бак нерж 85 л, 1.5 мм", price:15500},
        {id:"b5", name:"Бак чёрный 65 л, 2 мм", price:6000},
        {id:"b6", name:"Бак чёрный 85 л, 2 мм", price:6500},
        {id:"elbow", name:"Колено Ø115 мм 45°", price:600},
        {id:"roof", name:"Зонт Ø115 мм", price:1000},
        {id:"clamp", name:"Хомут обжимной Ø115 мм", price:350},
        {id:"pass", name:"Потолочно-проходной узел", price:3500}
    ];

    let cart = [];
    let currentProduct = null;
    let selectedAddons = {};
    let currentSelectedId = null;
    let currentFilteredSortedProducts = [...products];

    function showMessage(msg, isErr) {
        let div = document.createElement('div');
        div.className = 'success-msg';
        div.textContent = msg;
        if(isErr) div.style.background = "#c0392b";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    function applyFilterAndSort() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const sortValue = document.getElementById('sortSelect').value;
        const shapeValue = document.getElementById('shapeFilter').value;

        let filtered = products.filter(product => {
            // Поиск по названию
            const matchesSearch = product.name.toLowerCase().includes(searchTerm);
            
            // Фильтр по форме
            let matchesShape = true;
            if (shapeValue === 'round') {
                matchesShape = product.type === 'round';
            } else if (shapeValue === 'rect') {
                matchesShape = product.type === 'rect';
            }
            
            return matchesSearch && matchesShape;
        });

        // Сортировка
        if (sortValue === 'price-asc') {
            filtered.sort((a, b) => a.price - b.price);
        } else if (sortValue === 'price-desc') {
            filtered.sort((a, b) => b.price - a.price);
        } else {
            filtered.sort((a, b) => a.id - b.id);
        }

        currentFilteredSortedProducts = filtered;
        renderDropdownList();
    }

    function renderDropdownList() {
        const container = document.getElementById('dropdownContent');
        let html = '';
        for(let p of currentFilteredSortedProducts) {
            let icon = p.name.includes('Чан') ? '🛢️' : (p.name.includes('Котёл') ? '⚙️' : '🔥');
            html += `<div class="dropdown-item" data-id="${p.id}" onclick="selectProduct(${p.id})">
                        <h4>${icon} ${p.name}</h4>
                        <div class="price-drop">${p.price.toLocaleString('ru-RU')} ₽</div>
                    </div>`;
        }
        if (html === '') {
            html = '<div class="dropdown-item" style="cursor:default; color:#888;">Ничего не найдено</div>';
        }
        container.innerHTML = html;
        if (currentSelectedId) {
            highlightSelected(currentSelectedId);
        }
    }

    function highlightSelected(id) {
        document.querySelectorAll('.dropdown-item').forEach(item => {
            item.classList.remove('selected');
        });
        let selectedItem = document.querySelector(`.dropdown-item[data-id="${id}"]`);
        if(selectedItem) {
            selectedItem.classList.add('selected');
        }
        currentSelectedId = id;
    }

    function renderAddons() {
        let container = document.getElementById('addonsBlock');
        if(!currentProduct.hasAddons) {
            container.innerHTML = '';
            return;
        }
        let html = '<div class="addons"><h3>➕ Допы (можно выбрать несколько)</h3>';
        for(let a of addonsList) {
            let count = selectedAddons[a.id] ? selectedAddons[a.id].quantity : 0;
            html += `<div class="addon-item">
                        <span class="addon-name">${a.name}</span>
                        <span class="addon-price">${a.price.toLocaleString('ru-RU')} ₽</span>
                        <div class="addon-controls">
                            <button onclick="changeAddonCount('${a.id}', '${a.name}', ${a.price}, -1)">−</button>
                            <span class="addon-count" id="count_${a.id}">${count}</span>
                            <button onclick="changeAddonCount('${a.id}', '${a.name}', ${a.price}, 1)">+</button>
                        </div>
                    </div>`;
        }
        html += '</div>';
        container.innerHTML = html;
    }

    window.changeAddonCount = function(id, name, price, delta) {
        if(!selectedAddons[id]) {
            if(delta > 0) {
                selectedAddons[id] = { name, price, quantity: 1 };
            }
        } else {
            let newQty = selectedAddons[id].quantity + delta;
            if(newQty <= 0) {
                delete selectedAddons[id];
            } else {
                selectedAddons[id].quantity = newQty;
            }
        }
        updateAddonsDisplay();
        updatePrice();
    };

    function updateAddonsDisplay() {
        for(let a of addonsList) {
            let span = document.getElementById('count_' + a.id);
            if(span) {
                let qty = selectedAddons[a.id] ? selectedAddons[a.id].quantity : 0;
                span.textContent = qty;
            }
        }
    }

    function updatePrice() {
        if(!currentProduct) return;
        let addSum = 0;
        for(let k in selectedAddons) {
            addSum += selectedAddons[k].price * selectedAddons[k].quantity;
        }
        let total = currentProduct.price + addSum;
        document.getElementById('cardPrice').innerHTML = `💰 ${total.toLocaleString('ru-RU')} ₽`;
    }

    function selectProduct(id) {
        currentProduct = products.find(p => p.id === id);
        selectedAddons = {};
        highlightSelected(id);
        document.getElementById('productCard').classList.add('show');
        document.getElementById('cardImage').src = currentProduct.img;
        document.getElementById('cardName').innerText = currentProduct.name;
        document.getElementById('cardSpecs').innerHTML = currentProduct.specs;
        document.getElementById('cardPrice').innerHTML = `💰 ${currentProduct.price.toLocaleString('ru-RU')} ₽`;
        renderAddons();
        document.getElementById('dropdownContent').classList.remove('show');
    }

    function updateCart() {
        let container = document.getElementById('cartItems');
        let totalSpan = document.getElementById('totalSum');
        if(cart.length === 0) {
            container.innerHTML = '<div class="empty-cart">Корзина пуста</div>';
            totalSpan.innerText = '0';
            document.getElementById('orderForm').style.display = 'none';
            return;
        }
        let total = 0;
        let html = '';
        for(let i = 0; i < cart.length; i++) {
            html += `<div class="cart-item">
                        <span><strong>${cart[i].name}</strong> — ${cart[i].price.toLocaleString('ru-RU')} ₽</span>
                        <button class="remove-item" onclick="removeFromCart(${i})">Удалить</button>
                    </div>`;
            total += cart[i].price;
        }
        container.innerHTML = html;
        totalSpan.innerText = total.toLocaleString('ru-RU');
        document.getElementById('orderForm').style.display = 'block';
    }

    function removeFromCart(idx) {
        cart.splice(idx, 1);
        updateCart();
        showMessage('🗑 Товар удалён из корзины');
    }

    function addToCart() {
        if(!currentProduct) {
            showMessage('❌ Сначала выберите товар', true);
            return;
        }
        cart.push({ name: currentProduct.name, price: currentProduct.price });
        for(let k in selectedAddons) {
            let addon = selectedAddons[k];
            for(let i = 0; i < addon.quantity; i++) {
                cart.push({ name: addon.name, price: addon.price });
            }
        }
        updateCart();
        showMessage(`✓ ${currentProduct.name} и выбранные допы добавлены в корзину`);
    }

    async function sendOrder() {
        let name = document.getElementById('userName').value.trim();
        let email = document.getElementById('userEmail').value.trim();
        let phone = document.getElementById('userPhone').value.trim();
        let address = document.getElementById('userAddress').value;

        if(!name || !email || !phone) {
            showMessage('❌ Заполните имя, email и телефон', true);
            return;
        }
        if(cart.length === 0) {
            showMessage('❌ Корзина пуста', true);
            return;
        }

        let items = '';
        let total = 0;
        for(let it of cart) {
            items += `${it.name} — ${it.price.toLocaleString('ru-RU')} ₽\n`;
            total += it.price;
        }

        let orderData = {
            name: name,
            email: email,
            phone: phone,
            address: address,
            order: items,
            total: total.toLocaleString('ru-RU')
        };

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });
            
            showMessage('✅ Заказ отправлен! Мы свяжемся с вами');
            cart = [];
            updateCart();
            document.getElementById('userName').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPhone').value = '';
            document.getElementById('userAddress').value = '';
        } catch(error) {
            showMessage('⚠️ Ошибка, но заказ сохранён. Свяжитесь с нами', true);
        }
    }

    // Обработчики событий
    document.getElementById('searchInput').addEventListener('input', () => {
        applyFilterAndSort();
    });
    document.getElementById('sortSelect').addEventListener('change', () => {
        applyFilterAndSort();
    });
    document.getElementById('shapeFilter').addEventListener('change', () => {
        applyFilterAndSort();
    });

    document.getElementById('dropdownBtn').onclick = () => {
        document.getElementById('dropdownContent').classList.toggle('show');
    };
    document.getElementById('addToCartBtn').onclick = addToCart;
    document.getElementById('sendOrderBtn').onclick = sendOrder;

    // Инициализация
    applyFilterAndSort();
    if (currentFilteredSortedProducts.length > 0) {
        selectProduct(currentFilteredSortedProducts[0].id);
    }
</script>
