<head>

        .search-input{flex:3;min-width:200px;cursor:text}
        .sort-select,.shape-filter{appearance:none;background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23b45a2b" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>') no-repeat right 15px center}

        .dropdown-container{max-width:500px;margin:0 auto 30px;position:relative}
        .dropdown-btn{width:100%;background:#d97a2b;color:#fff;padding:14px 20px;border:none;border-radius:50px;font-size:16px;cursor:pointer;text-align:left;transition:all 0.3s ease}
        .dropdown-btn:hover{background:#c06622}
        .dropdown-content{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border-radius:20px;max-height:300px;overflow-y:auto;border:2px solid #d97a2b;z-index:100;margin-top:5px}
        .dropdown-content.show{display:block}
        .dropdown-item{padding:12px 20px;border-bottom:1px solid #f0e0d5;cursor:pointer;transition:all 0.2s}
        .dropdown-item:hover{background:#fef3e9;padding-left:30px}
        .dropdown-item.selected{background:#d97a2b;color:#fff}
        .dropdown-item.selected .price-drop{color:#ffd700}
        .dropdown-item h4{color:#a55826}
        .dropdown-item .price-drop{font-weight:700;color:#b45a2b;margin-top:5px}
        .product-card{background:#fff;border-radius:30px;padding:25px;max-width:700px;margin:20px auto;display:none;border:2px solid #eadbcb}
        .product-card.show{display:block}
        .product-card img{width:100%;max-height:300px;object-fit:contain;border-radius:20px;margin-bottom:20px}
        .product-card h2{text-align:center;color:#9b4f23;margin-bottom:15px}
        .specs{background:#fef8f2;padding:15px;border-radius:20px;margin:15px 0;line-height:1.6;border-left:4px solid #d97a2b}
        .price{font-size:28px;font-weight:700;color:#bc631c;text-align:center;margin:15px 0}
        .addons{background:#fdf8f1;border-radius:20px;padding:10px;margin-top:15px}
        .addon-item{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;margin:5px 0;background:#fff;border-radius:50px;border:1px solid #eadbcb}
        .addon-item:hover{background:#fef3e9}
        .addon-controls{display:flex;gap:10px;align-items:center}
        .addon-controls button{width:30px;height:30px;border-radius:50%;background:#d97a2b;color:#fff;border:none;font-size:18px;cursor:pointer}
        .add-to-cart,.send-btn{background:#d97a2b;color:#fff;width:100%;padding:14px;border:none;border-radius:50px;font-size:16px;cursor:pointer;margin-top:20px}

        .cart-item{background:#fef8f2;padding:12px;border-radius:50px;display:flex;justify-content:space-between;margin-bottom:10px}
        .remove-item{background:#c0392b;color:#fff;border:none;border-radius:30px;padding:5px 15px;cursor:pointer}
        .total{text-align:right;font-size:20px;font-weight:700;margin-top:15px;padding-top:15px;border-top:2px solid #d97a2b}
        .empty-cart{text-align:center;color:#aa8f72;padding:20px}
        .order-form{margin-top:25px;display:none}
        .order-form input,.order-form textarea{width:100%;padding:10px;margin:8px 0;border-radius:40px;border:1px solid #d9c7b4}
        .success-msg{position:fixed;bottom:20px;right:20px;background:#27ae60;color:#fff;padding:10px 20px;border-radius:30px;z-index:1000;animation:fadeOut 3s forwards}

</head>

            <option value="price-desc">💰 Сначала дорогие</option>
        </select>
        <select id="shapeFilter" class="shape-filter">
            <option value="all">🎨 Все печи</option>
            <option value="round">🔴 Круглые (труба)</option>
            <option value="rect">🟦 Прямоугольные</option>
        </select>
    </div>

    <div class="dropdown-container">
        <button class="dropdown-btn" id="dropdownBtn">📋 Выбрать товар ▼</button>
        <div class="dropdown-content" id="dropdownContent"></div>
    </div>

    <div id="productCard" class="product-card">

        <h2 id="cardName"></h2>
        <div class="specs" id="cardSpecs"></div>
        <div class="price" id="cardPrice"></div>
        <div id="addonsBlock"></div>
        <button class="add-to-cart" id="addToCartBtn">➕ Добавить в корзину</button>
    </div>

    <div class="cart-section">
        <h2>🛒 Корзина</h2>

        <div class="total">💰 Итого: <span id="totalSum">0</span> ₽</div>

            <input type="tel" id="userPhone" placeholder="Телефон *">
            <textarea id="userAddress" placeholder="Адрес доставки" rows="2"></textarea>
            <button class="send-btn" id="sendOrderBtn">📨 Отправить заказ</button>
        </div>
    </div>
</div>

    function showMessage(msg,isErr){let d=document.createElement('div');d.className='success-msg';d.textContent=msg;if(isErr)d.style.background="#c0392b";document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}

    function applyFilterAndSort(){
        const searchTerm=document.getElementById('searchInput').value.toLowerCase();
        const sortValue=document.getElementById('sortSelect').value;
        const shapeValue=document.getElementById('shapeFilter').value;
        let filtered=products.filter(p=>{
            const matchesSearch=p.name.toLowerCase().includes(searchTerm);
            let matchesShape=true;
            if(shapeValue==='round')matchesShape=p.type==='round';
            else if(shapeValue==='rect')matchesShape=p.type==='rect';
            return matchesSearch&&matchesShape;
        });
        if(sortValue==='price-asc')filtered.sort((a,b)=>a.price-b.price);
        else if(sortValue==='price-desc')filtered.sort((a,b)=>b.price-a.price);
        else filtered.sort((a,b)=>a.id-b.id);
        currentFilteredSortedProducts=filtered;
        renderDropdownList();
    }

    function renderDropdownList(){
        let html='';
        for(let p of currentFilteredSortedProducts){
            let icon=p.name.includes('Чан')?'🛢️':(p.name.includes('Котёл')?'⚙️':'🔥');
            html+=`<div class="dropdown-item" data-id="${p.id}" onclick="selectProduct(${p.id})"><h4>${icon} ${p.name}</h4><div class="price-drop">${p.price.toLocaleString('ru-RU')} ₽</div></div>`;
        }
        if(!html)html='<div class="dropdown-item" style="cursor:default;color:#888;">Ничего не найдено</div>';
        document.getElementById('dropdownContent').innerHTML=html;
        if(currentSelectedId)highlightSelected(currentSelectedId);
    }

    function highlightSelected(id){
        document.querySelectorAll('.dropdown-item').forEach(i=>i.classList.remove('selected'));
        let selectedItem=document.querySelector(`.dropdown-item[data-id="${id}"]`);
        if(selectedItem)selectedItem.classList.add('selected');
        currentSelectedId=id;
    }

    function renderAddons(){
        let container=document.getElementById('addonsBlock');
        if(!currentProduct.hasAddons){container.innerHTML='';return;}
        let html='<div class="addons"><h3>➕ Допы (можно выбрать несколько)</h3>';
        for(let a of addonsList){
            let cnt=selectedAddons[a.id]?selectedAddons[a.id].quantity:0;
            html+=`<div class="addon-item"><span class="addon-name">${a.name}</span><span class="addon-price">${a.price.toLocaleString('ru-RU')} ₽</span><div class="addon-controls"><button onclick="changeAddonCount('${a.id}','${a.name}',${a.price},-1)">−</button><span class="addon-count" id="count_${a.id}">${cnt}</span><button onclick="changeAddonCount('${a.id}','${a.name}',${a.price},1)">+</button></div></div>`;
        }
        html+='</div>';
        container.innerHTML=html;
    }

    window.changeAddonCount=function(id,name,price,delta){
        if(!selectedAddons[id]){if(delta>0)selectedAddons[id]={name,price,quantity:1};}
        else{let newQty=selectedAddons[id].quantity+delta;if(newQty<=0)delete selectedAddons[id];else selectedAddons[id].quantity=newQty;}
        for(let a of addonsList){let span=document.getElementById('count_'+a.id);if(span)span.textContent=selectedAddons[a.id]?selectedAddons[a.id].quantity:0;}
        if(currentProduct){let addSum=0;for(let k in selectedAddons)addSum+=selectedAddons[k].price*selectedAddons[k].quantity;document.getElementById('cardPrice').innerHTML=`💰 ${(currentProduct.price+addSum).toLocaleString('ru-RU')} ₽`;}
    };

    function selectProduct(id){
        currentProduct=products.find(p=>p.id===id);
        selectedAddons={};
        highlightSelected(id);
        document.getElementById('productCard').classList.add('show');
        document.getElementById('cardImage').src=currentProduct.img;
        document.getElementById('cardName').innerText=currentProduct.name;
        document.getElementById('cardSpecs').innerHTML=currentProduct.specs;
        document.getElementById('cardPrice').innerHTML=`💰 ${currentProduct.price.toLocaleString('ru-RU')} ₽`;
        renderAddons();
        document.getElementById('dropdownContent').classList.remove('show');
    }

    function updateCart(){
        let container=document.getElementById('cartItems');
        let totalSpan=document.getElementById('totalSum');
        if(cart.length===0){container.innerHTML='<div class="empty-cart">Корзина пуста</div>';totalSpan.innerText='0';document.getElementById('orderForm').style.display='none';return;}
        let total=0,html='';
        for(let i=0;i<cart.length;i++){html+=`<div class="cart-item"><span><strong>${cart[i].name}</strong> — ${cart[i].price.toLocaleString('ru-RU')} ₽</span><button class="remove-item" onclick="removeFromCart(${i})">Удалить</button></div>`;total+=cart[i].price;}
        container.innerHTML=html;
        totalSpan.innerText=total.toLocaleString('ru-RU');
        document.getElementById('orderForm').style.display='block';
    }

    function removeFromCart(idx){cart.splice(idx,1);updateCart();showMessage('🗑 Товар удалён из корзины');}

    function addToCart(){
        if(!currentProduct){showMessage('❌ Сначала выберите товар',1);return;}
        cart.push({name:currentProduct.name,price:currentProduct.price});
        for(let k in selectedAddons){let a=selectedAddons[k];for(let i=0;i<a.quantity;i++)cart.push({name:a.name,price:a.price});}
        updateCart();
        showMessage(`✓ ${currentProduct.name} и выбранные допы добавлены в корзину`);
    }

    async function sendOrder(){
        let name=document.getElementById('userName').value.trim(),email=document.getElementById('userEmail').value.trim(),phone=document.getElementById('userPhone').value.trim(),address=document.getElementById('userAddress').value;
        if(!name||!email||!phone){showMessage('❌ Заполните имя, email и телефон',1);return;}
        if(cart.length===0){showMessage('❌ Корзина пуста',1);return;}
        let items='',total=0;for(let it of cart){items+=`${it.name} — ${it.price.toLocaleString('ru-RU')} ₽\n`;total+=it.price;}
        let orderData={name,email,phone,address,order:items,total:total.toLocaleString('ru-RU')};
        try{await fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(orderData)});showMessage('✅ Заказ отправлен! Мы свяжемся с вами');cart=[];updateCart();document.getElementById('userName').value='';document.getElementById('userEmail').value='';document.getElementById('userPhone').value='';document.getElementById('userAddress').value='';}catch(e){showMessage('⚠️ Ошибка, но заказ сохранён',1);}
    }

    document.getElementById('searchInput').addEventListener('input',()=>applyFilterAndSort());
    document.getElementById('sortSelect').addEventListener('change',()=>applyFilterAndSort());
    document.getElementById('shapeFilter').addEventListener('change',()=>applyFilterAndSort());
    document.getElementById('dropdownBtn').onclick=()=>document.getElementById('dropdownContent').classList.toggle('show');
    document.getElementById('addToCartBtn').onclick=addToCart;
    document.getElementById('sendOrderBtn').onclick=sendOrder;
    applyFilterAndSort();
    if(currentFilteredSortedProducts.length>0)selectProduct(currentFilteredSortedProducts[0].id);
</script>
</body>
</html>
