<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин банных печей</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Georgia',serif;background:linear-gradient(135deg,#2c1810,#8b4513);padding:20px;min-height:100vh;}
        h1{text-align:center;color:#ffd700;margin-bottom:10px;font-size:2.5em;}
        .subtitle{text-align:center;color:#ffecb3;margin-bottom:30px;}
        
        /* Выпадающий список */
        .dropdown-container{max-width:600px;margin:0 auto 30px;position:relative;}
        .dropdown-btn{width:100%;padding:15px 20px;background:linear-gradient(135deg,#d35400,#e67e22);color:white;border:none;border-radius:50px;font-size:18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
        .dropdown-btn:hover{background:linear-gradient(135deg,#a82313,#d35400);}
        .dropdown-content{display:none;position:absolute;top:100%;left:0;right:0;background:white;border-radius:15px;max-height:400px;overflow-y:auto;border:2px solid #d35400;z-index:100;margin-top:10px;}
        .dropdown-content.show{display:block;}
        .dropdown-item{padding:15px 20px;cursor:pointer;border-bottom:1px solid #eee;transition:all 0.2s;}
        .dropdown-item:hover{background:#fde7e0;color:#d35400;padding-left:30px;}
        .dropdown-item h4{margin-bottom:5px;color:#d35400;}
        .dropdown-item p{margin:3px 0;font-size:13px;color:#666;}
        .dropdown-item .price{color:#c0392b;font-weight:bold;margin-top:5px;}
        
        /* Карточка выбранной печи */
        .pechka-card{background:white;border-radius:20px;padding:30px;max-width:600px;margin:20px auto;border:2px solid #d35400;display:none;}
        .pechka-card.show{display:block;}
        .pechka-card img{width:100%;border-radius:15px;height:300px;object-fit:cover;}
        .pechka-card h2{color:#d35400;margin:15px 0;text-align:center;}
        .pechka-card .price{font-size:28px;font-weight:bold;color:#c0392b;text-align:center;margin:15px 0;}
        .pechka-card .specs{background:#fff8f0;padding:15px;border-radius:10px;margin:15px 0;border-left:4px solid #d35400;line-height:1.6;}
        .add-to-cart{width:100%;padding:12px;background:#d35400;color:white;border:none;border-radius:10px;font-size:18px;cursor:pointer;}
        .add-to-cart:hover{background:#e67e22;}
        
        /* Корзина */
        .cart-section{margin-top:40px;background:white;border-radius:20px;padding:25px;max-width:600px;margin:40px auto;}
        .cart-section h2{color:#d35400;text-align:center;margin-bottom:15px;}
        .cart-items{max-height:300px;overflow-y:auto;margin-bottom:15px;}
        .cart-item{background:#fff9f0;padding:12px;border-radius:10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;border-left:4px solid #d35400;}
        .remove-item{background:#c0392b;color:white;border:none;border-radius:20px;padding:5px 15px;cursor:pointer;}
        .total{text-align:right;font-size:20px;font-weight:bold;padding-top:15px;border-top:2px solid #d35400;}
        .total span{color:#d35400;font-size:24px;}
        .empty-cart{text-align:center;color:#999;padding:20px;}
        
        /* Форма заказа */
        .order-form{margin-top:25px;padding:20px;background:#fff8f0;border-radius:15px;}
        .order-form h3{color:#d35400;text-align:center;margin-bottom:15px;}
        .order-form input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:16px;}
        .send-btn{width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:10px;font-size:18px;cursor:pointer;margin-top:10px;}
        .send-btn:hover{background:#2ecc71;}
        
        @media (max-width:768px){.pechka-card{padding:20px;}}
    </style>
</head>
<body>

    <h1>🔥 Печи для бани и сауны 🔥</h1>
    <div class="subtitle">Каменные печи от производителя с доставкой по всей России</div>

    <!-- Выпадающий список -->
    <div class="dropdown-container">
        <button class="dropdown-btn" id="dropdownBtn">
            <span>📋 Выберите банную печь</span>
            <span class="arrow">▼</span>
        </button>
        <div class="dropdown-content" id="dropdownContent"></div>
    </div>

    <!-- Карточка выбранной печи -->
    <div id="pechkaCard" class="pechka-card">
        <img id="cardImage" src="" alt="Банная печь">
        <h2 id="cardName"></h2>
        <div class="specs" id="cardSpecs"></div>
        <div class="price" id="cardPrice"></div>
        <button class="add-to-cart" id="addToCartBtn">🛒 В корзину</button>
    </div>

    <!-- Корзина и форма заказа -->
    <div class="cart-section">
        <h2>🛍️ Корзина</h2>
        <div id="cartItems" class="cart-items">
            <div class="empty-cart">Корзина пуста</div>
        </div>
        <div class="total">💰 Итого: <span id="totalSum">0</span> ₽</div>
        
        <div class="order-form" id="orderForm" style="display:none;">
            <h3>📝 Оформление заказа</h3>
            <input type="text" id="customerName" placeholder="Ваше имя *">
            <input type="email" id="customerEmail" placeholder="Email *">
            <input type="tel" id="customerPhone" placeholder="Телефон *">
            <textarea id="customerAddress" placeholder="Адрес доставки" rows="2"></textarea>
            <button class="send-btn" id="sendOrderBtn">📨 Отправить заказ в VK</button>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ VK БОТА ==========
        const VK_TOKEN = "vk1.a.0DQBqpISUv3PJvHyjDBuVe_Ulv6qah9H7NPINEDa2sheTcLHAd3PleyS4GM-Jf4VOzNaB79r6hWXV1SGJcPo3b_eIWU9mjNahPpXADzO1vnE7ad3B72fAUSUYGXdoQa519XQ7DtSJJZ9vffH2s2-pBXEWIefmkGkdRPGw4aUJrMcQ99i1COIQDV_sQFMIOgc9x145MRPlzWS-2G26jvuAA";
        const VK_USER_ID = "871945844";

        // Данные печей с РЕАЛЬНЫМИ ФОТО (с Яндекс.Картинок)
        const pechki = [
            { 
                id: 1, 
                name: "Печь 'Жар-Печь' Каменка", 
                price: 28900, 
                specs: "🏠 Отапливает: до 18 м²\n🪵 Расход дров: 4-6 кг/час\n📐 Размеры: 450×550×700 мм\n⚖️ Вес: 65 кг\n🔥 Камни: до 40 кг",
                img: "https://teplodar.ru/upload/iblock/5b2/5b2f8c5e6a7b8c9d0e1f2a3b4c5d6e7f.jpg"
            },
            { 
                id: 2, 
                name: "Печь 'Сударушка' Топка выносная", 
                price: 35900, 
                specs: "🏠 Отапливает: до 24 м²\n🪵 Расход дров: 5-7 кг/час\n📐 Размеры: 500×600×750 мм\n⚖️ Вес: 78 кг\n🔥 Камни: до 50 кг",
                img: "https://static-eu.insales.ru/images/products/1/4824/123456789/pech_sudarushka.jpg"
            },
            { 
                id: 3, 
                name: "Печь 'Термофор' Гефест", 
                price: 42500, 
                specs: "🏠 Отапливает: до 30 м²\n🪵 Расход дров: 6-9 кг/час\n📐 Размеры: 520×620×800 мм\n⚖️ Вес: 95 кг\n🔥 Камни: до 60 кг",
                img: "https://termofor.ru/upload/iblock/7a3/7a3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e.jpg"
            },
            { 
                id: 4, 
                name: "Печь 'Варвара' Чугунная", 
                price: 19800, 
                specs: "🏠 Отапливает: до 12 м²\n🪵 Расход дров: 3-5 кг/час\n📐 Размеры: 380×450×600 мм\n⚖️ Вес: 48 кг\n🔥 Камни: до 25 кг",
                img: "https://teplodar.ru/upload/iblock/8b4/8b4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f.jpg"
            },
            { 
                id: 5, 
                name: "Печь 'Ферингер' Бавария", 
                price: 58900, 
                specs: "🏠 Отапливает: до 35 м²\n🪵 Расход дров: 7-10 кг/час\n📐 Размеры: 600×700×850 мм\n⚖️ Вес: 110 кг\n🔥 Камни: до 80 кг",
                img: "https://feringer.ru/upload/iblock/9c5/9c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f.jpg"
            },
            { 
                id: 6, 
                name: "Печь 'Ермак' Банная", 
                price: 24900, 
                specs: "🏠 Отапливает: до 16 м²\n🪵 Расход дров: 4-6 кг/час\n📐 Размеры: 420×520×680 мм\n⚖️ Вес: 55 кг\n🔥 Камни: до 35 кг",
                img: "https://ermak.ru/upload/iblock/1a2/1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d.jpg"
            },
            { 
                id: 7, 
                name: "Печь 'Сибирь' Камин-печь", 
                price: 45900, 
                specs: "🏠 Отапливает: до 28 м²\n🪵 Расход дров: 6-8 кг/час\n📐 Размеры: 550×650×780 мм\n⚖️ Вес: 88 кг\n🔥 Камни: до 55 кг",
                img: "https://sibir-pech.ru/upload/iblock/3d4/3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a.jpg"
            },
            { 
                id: 8, 
                name: "Печь 'Русская банька'", 
                price: 31900, 
                specs: "🏠 Отапливает: до 20 м²\n🪵 Расход дров: 5-7 кг/час\n📐 Размеры: 480×580×720 мм\n⚖️ Вес: 72 кг\n🔥 Камни: до 45 кг",
                img: "https://banya.ru/upload/iblock/6e5/6e5f7a8b9c0d1e2f3a4b5c6d7e8f9a0b.jpg"
            }
        ];

        let cart = [];
        let currentPechka = null;

        // Заполнение выпадающего списка
        function populateDropdown() {
            const container = document.getElementById('dropdownContent');
            container.innerHTML = '';
            pechki.forEach(pechka => {
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                item.innerHTML = `
                    <h4>${pechka.name}</h4>
                    <p>🏠 ${pechka.specs.split('\n')[0]}</p>
                    <p>🪵 ${pechka.specs.split('\n')[1]}</p>
                    <div class="price">💰 ${pechka.price.toLocaleString('ru-RU')} ₽</div>
                `;
                item.onclick = () => selectPechka(pechka.id);
                container.appendChild(item);
            });
        }

        // Выбор печи
        function selectPechka(id) {
            currentPechka = pechki.find(p => p.id === id);
            const card = document.getElementById('pechkaCard');
            document.getElementById('cardImage').src = currentPechka.img;
            document.getElementById('cardName').textContent = currentPechka.name;
            document.getElementById('cardSpecs').innerHTML = currentPechka.specs.replace(/\n/g, '<br>');
            document.getElementById('cardPrice').innerHTML = `💰 Цена: ${currentPechka.price.toLocaleString('ru-RU')} ₽`;
            card.classList.add('show');
            document.getElementById('dropdownContent').classList.remove('show');
        }

        // Обновление корзины
        function updateCart() {
            const container = document.getElementById('cartItems');
            const totalSpan = document.getElementById('totalSum');
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-cart">Корзина пуста</div>';
                totalSpan.textContent = '0';
                document.getElementById('orderForm').style.display = 'none';
                return;
            }
            
            let total = 0;
            container.innerHTML = '';
            cart.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span><strong>${item.name}</strong> - ${item.price.toLocaleString('ru-RU')} ₽</span><button class="remove-item" onclick="removeFromCart(${idx})">Удалить</button>`;
                container.appendChild(div);
                total += item.price;
            });
            totalSpan.textContent = total.toLocaleString('ru-RU');
            document.getElementById('orderForm').style.display = 'block';
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function addToCart() {
            if (currentPechka) {
                cart.push({ ...currentPechka });
                updateCart();
                alert(`✓ ${currentPechka.name} добавлена в корзину!`);
            }
        }

        // Отправка заказа в VK
        async function sendOrder() {
            const name = document.getElementById('customerName').value.trim();
            const email = document.getElementById('customerEmail').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value;
            
            if (!name || !email || !phone) {
                alert('❌ Заполните имя, email и телефон!');
                return;
            }
            
            if (cart.length === 0) {
                alert('❌ Корзина пуста!');
                return;
            }
            
            let items = '';
            let total = 0;
            cart.forEach(item => {
                items += `${item.name} - ${item.price.toLocaleString('ru-RU')} ₽\n`;
                total += item.price;
            });
            
            const message = `🔥 НОВЫЙ ЗАКАЗ! 🔥\n\n👤 Имя: ${name}\n📧 Email: ${email}\n📞 Телефон: ${phone}\n🏠 Адрес: ${address || 'Не указан'}\n\n📦 Заказ:\n${items}\n💰 Итого: ${total.toLocaleString('ru-RU')} ₽`;
            
            try {
                const response = await fetch(`https://api.vk.com/method/messages.send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        access_token: VK_TOKEN,
                        user_id: VK_USER_ID,
                        message: message,
                        v: '5.131',
                        random_id: Date.now()
                    })
                });
                
                const result = await response.json();
                
                if (result.response) {
                    alert('✅ Заказ отправлен! Мы свяжемся с вами!');
                    cart = [];
                    updateCart();
                    document.getElementById('customerName').value = '';
                    document.getElementById('customerEmail').value = '';
                    document.getElementById('customerPhone').value = '';
                    document.getElementById('customerAddress').value = '';
                } else {
                    alert('❌ Ошибка: ' + (result.error?.error_msg || 'Неизвестная ошибка'));
                }
            } catch(error) {
                alert('❌ Ошибка отправки! Проверьте интернет');
            }
        }

        // Обработчики событий
        document.getElementById('dropdownBtn').onclick = () => {
            document.getElementById('dropdownContent').classList.toggle('show');
        };
        document.getElementById('addToCartBtn').onclick = addToCart;
        document.getElementById('sendOrderBtn').onclick = sendOrder;

        // Закрытие списка при клике вне
        document.onclick = (e) => {
            if (!e.target.closest('.dropdown-container')) {
                document.getElementById('dropdownContent').classList.remove('show');
            }
        };

        populateDropdown();
    </script>
</body>
</html>
