<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель ТЕРМОГРАД</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;padding:20px;color:#eee;}
        .container{max-width:1400px;margin:0 auto;}
        h1{color:#d97a2b;margin-bottom:20px;}
        .login-form{max-width:400px;margin:100px auto;background:#16213e;padding:30px;border-radius:20px;}
        .login-form input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;}
        .login-form button{width:100%;padding:12px;background:#d97a2b;color:white;border:none;border-radius:10px;cursor:pointer;}
        .stats{display:flex;gap:20px;margin-bottom:30px;flex-wrap:wrap;}
        .stat-card{background:#16213e;padding:20px;border-radius:15px;flex:1;min-width:150px;text-align:center;}
        .stat-card h3{color:#d97a2b;font-size:28px;}
        .orders-table{width:100%;border-collapse:collapse;background:#16213e;border-radius:15px;overflow:hidden;}
        .orders-table th,.orders-table td{padding:12px;text-align:left;border-bottom:1px solid #2a3a5e;}
        .orders-table th{background:#0f3460;color:#d97a2b;}
        .orders-table tr:hover{background:#1a2a4a;}
        .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
        .hidden{display:none;}
        .logout-btn{background:#c0392b;color:white;border:none;padding:8px 20px;border-radius:10px;cursor:pointer;}
        .refresh-btn{background:#27ae60;color:white;border:none;padding:8px 20px;border-radius:10px;cursor:pointer;margin-right:10px;}
        .table-link{background:#16213e;padding:20px;border-radius:15px;margin-top:20px;text-align:center;}
        .table-link a{background:#d97a2b;color:#1a1a2e;padding:10px 20px;border-radius:10px;text-decoration:none;}
        .loading{text-align:center;padding:30px;color:#888;}
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Форма входа (пароль не показывается) -->
    <div id="loginForm" class="login-form">
        <h2>🔐 Вход в админ-панель</h2>
        <input type="password" id="password" placeholder="Введите пароль">
        <button onclick="checkPassword()">Войти</button>
    </div>

    <!-- Админ-панель -->
    <div id="adminPanel" class="hidden">
        <div class="admin-header">
            <h1>🔥 ТЕРМОГРАД - Админ-панель</h1>
            <div>
                <button class="refresh-btn" onclick="loadOrders()">🔄 Обновить</button>
                <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats" id="stats"></div>

        <!-- Таблица заказов -->
        <div style="overflow-x: auto;">
            <table class="orders-table" id="ordersTable">
                <thead>
                    <tr><th>Дата</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Адрес</th><th>Заказ</th><th>Итого</th></tr>
                </thead>
                <tbody id="ordersBody">
                    <tr><td colspan="7" class="loading">Загрузка заказов...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Ссылка на таблицу -->
        <div class="table-link">
            <a href="https://docs.google.com/spreadsheets/d/1pVQFhA2p4gBSUJNVfV9q3PU4aUhlingoQ6Es-KUZ5YI/edit" target="_blank">📊 Открыть Google Таблицу</a>
        </div>
    </div>
</div>

<script>
    // ВАШИ ДАННЫЕ
    const GOOGLE_SHEET_ID = "1pVQFhA2p4gBSUJNVfV9q3PU4aUhlingoQ6Es-KUZ5YI";
    const ADMIN_PASSWORD = "admin123";

    let ordersData = [];

    function checkPassword() {
        const pass = document.getElementById('password').value;
        if(pass === ADMIN_PASSWORD) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            loadOrders();
        } else {
            alert('Неверный пароль!');
        }
    }

    function logout() {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('password').value = '';
    }

    async function loadOrders() {
        const tbody = document.getElementById('ordersBody');
        tbody.innerHTML = '<tr><td colspan="7" class="loading">Загрузка заказов...</td></tr>';
        
        try {
            // Используем Google Sheets API для чтения данных
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_SHEET_ID}/values/Лист1?key=AIzaSyDpVxU5KkFzZyvJ5hLZqjK8sY9a0Lp1QwE`;
            
            // Для демонстрации показываем, что заказы сохраняются в таблицу
            // Реальное чтение требует API ключа, поэтому показываем ссылку на таблицу
            
            tbody.innerHTML = `<tr><td colspan="7" class="loading">
                📊 Заказы сохраняются в Google Таблицу<br><br>
                <a href="https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/edit" target="_blank" style="color:#d97a2b;">📋 Нажмите здесь, чтобы открыть таблицу с заказами</a>
                <br><br>
                После оформления заказа данные появятся в таблице.
            </td></tr>`;
            
            // Обновляем статистику
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><h3>📊</h3><p>Заказы в таблице</p></div>
                <div class="stat-card"><h3>✅</h3><p>Система работает</p></div>
            `;
            
        } catch(e) {
            console.error('Ошибка:', e);
            tbody.innerHTML = `<tr><td colspan="7" class="loading">Ошибка загрузки. Нажмите "Обновить" или откройте таблицу вручную.</td></tr>`;
        }
    }
</script>
</body>
</html>
