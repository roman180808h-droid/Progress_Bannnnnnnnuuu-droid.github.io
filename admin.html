<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель ТЕРМОГРАД</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;padding:20px;color:#eee;}
        .container{max-width:1400px;margin:0 auto;}
        h1{color:#d97a2b;margin-bottom:20px;}
        .login-form{max-width:400px;margin:100px auto;background:#16213e;padding:30px;border-radius:20px;}
        .login-form input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;}
        .login-form button{width:100%;padding:12px;background:#d97a2b;color:white;border:none;border-radius:10px;cursor:pointer;}
        .stats{display:flex;gap:20px;margin-bottom:30px;flex-wrap:wrap;}
        .stat-card{background:#16213e;padding:20px;border-radius:15px;flex:1;min-width:150px;text-align:center;}
        .stat-card h3{color:#d97a2b;font-size:28px;}
        .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
        .hidden{display:none;}
        .table-link{background:#16213e;padding:30px;border-radius:20px;text-align:center;margin-top:20px;}
        .table-link a{background:#d97a2b;color:#1a1a2e;padding:15px 30px;border-radius:50px;text-decoration:none;font-weight:bold;display:inline-block;margin-top:15px;}
        .table-link a:hover{background:#e67e22;}
        .logout-btn{background:#c0392b;color:white;border:none;padding:8px 20px;border-radius:10px;cursor:pointer;}
        .refresh-btn{background:#27ae60;color:white;border:none;padding:8px 20px;border-radius:10px;cursor:pointer;margin-right:10px;}
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Форма входа -->
    <div id="loginForm" class="login-form">
        <h2>🔐 Вход в админ-панель</h2>
        <input type="password" id="password" placeholder="Введите пароль">
        <button onclick="checkPassword()">Войти</button>
        <p style="margin-top:15px;color:#888;">Пароль: admin123</p>
    </div>

    <!-- Админ-панель -->
    <div id="adminPanel" class="hidden">
        <div class="admin-header">
            <h1>🔥 ТЕРМОГРАД - Админ-панель</h1>
            <div>
                <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><h3 id="ordersCount">0</h3><p>Всего заказов</p></div>
            <div class="stat-card"><h3 id="totalSum">0 ₽</h3><p>Общая выручка</p></div>
        </div>

        <div class="table-link">
            <h2>📊 Все заказы находятся в Google Таблице</h2>
            <p>Нажмите на кнопку ниже, чтобы открыть таблицу с заказами</p>
            <a href="https://docs.google.com/spreadsheets/d/1E9yD0ZkWHK9Z_SnCSKDELEbCclBl3AWT8HVoGzY11Bg/edit" target="_blank">📋 Открыть таблицу заказов</a>
            <p style="margin-top:20px;font-size:12px;color:#888;">Заказы добавляются автоматически при оформлении на сайте</p>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "admin123";

    function checkPassword() {
        const pass = document.getElementById('password').value;
        if(pass === ADMIN_PASSWORD) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        } else {
            alert('Неверный пароль!');
        }
    }

    function logout() {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('password').value = '';
    }
</script>
</body>
</html>
