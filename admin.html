<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель ТЕРМОГРАД</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;padding:20px;color:#eee;}
        .container{max-width:1400px;margin:0 auto;}
        h1{color:#d97a2b;margin-bottom:20px;}
        .login-form{max-width:400px;margin:100px auto;background:#16213e;padding:30px;border-radius:20px;}
        .login-form input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;}
        .login-form button{width:100%;padding:12px;background:#d97a2b;color:white;border:none;border-radius:10px;cursor:pointer;}
        .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
        .hidden{display:none;}
        .orders-panel{background:#16213e;border-radius:20px;padding:25px;margin-top:20px;}
        .orders-panel h2{color:#d97a2b;margin-bottom:15px;}
        .orders-panel a{display:inline-block;background:#27ae60;color:white;padding:12px 25px;border-radius:10px;text-decoration:none;margin-top:15px;}
        .orders-panel a:hover{background:#2ecc71;}
        .logout-btn{background:#c0392b;color:white;border:none;padding:8px 20px;border-radius:10px;cursor:pointer;}
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Форма входа -->
    <div id="loginForm" class="login-form">
        <h2>🔐 Вход в админ-панель</h2>
        <input type="password" id="password" placeholder="Введите пароль">
        <button onclick="checkPassword()">Войти</button>
        <p style="margin-top:15px;color:#888;">Пароль: admin123</p>
    </div>

    <!-- Админ-панель -->
    <div id="adminPanel" class="hidden">
        <div class="admin-header">
            <h1>🔥 ТЕРМОГРАД - Админ-панель</h1>
            <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
        </div>

        <div class="orders-panel">
            <h2>📊 Управление заказами</h2>
            <p>Все заказы сохраняются в Google Таблицу.</p>
            <a href="https://docs.google.com/spreadsheets/d/1pVQFhA2p4gBSUJNVfV9q3PU4aUhlingoQ6Es-KUZ5YI/edit" target="_blank">📋 Открыть таблицу заказов</a>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "admin123";

    function checkPassword() {
        const pass = document.getElementById('password').value;
        if(pass === ADMIN_PASSWORD) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        } else {
            alert('Неверный пароль!');
        }
    }

    function logout() {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('password').value = '';
    }
</script>
</body>
</html>
