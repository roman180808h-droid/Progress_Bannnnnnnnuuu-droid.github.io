<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель ТЕРМОГРАД</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;padding:20px;color:#eee;}
        .container{max-width:1400px;margin:0 auto;}
        h1{color:#d97a2b;margin-bottom:20px;}
        .login-form{max-width:400px;margin:100px auto;background:#16213e;padding:30px;border-radius:20px;}
        .login-form input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;}
        .login-form button{width:100%;padding:12px;background:#d97a2b;color:white;border:none;border-radius:10px;cursor:pointer;}
        .stats{display:flex;gap:20px;margin-bottom:30px;flex-wrap:wrap;}
        .stat-card{background:#16213e;padding:20px;border-radius:15px;flex:1;min-width:150px;text-align:center;}
        .stat-card h3{color:#d97a2b;font-size:28px;}
        .orders-table{width:100%;border-collapse:collapse;background:#16213e;border-radius:15px;overflow:hidden;}
        .orders-table th,.orders-table td{padding:12px;text-align:left;border-bottom:1px solid #2a3a5e;}
        .orders-table th{background:#0f3460;color:#d97a2b;}
        .orders-table tr:hover{background:#1a2a4a;}
        .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
        .hidden{display:none;}
        .logout-btn{background:#c0392b;color:white;border:none;padding:8px 20px;border-radius:10px;cursor:pointer;}
        .refresh-btn{background:#27ae60;color:white;border:none;padding:8px 20px;border-radius:10px;cursor:pointer;margin-right:10px;}
        .loading{text-align:center;padding:30px;color:#888;}
        .error{color:#c0392b;text-align:center;padding:30px;}
        .back-link{display:inline-block;margin-top:20px;color:#888;text-decoration:none;}
        .back-link:hover{color:#d97a2b;}
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Форма входа -->
    <div id="loginForm" class="login-form">
        <h2>🔐 Вход в админ-панель</h2>
        <input type="password" id="password" placeholder="Введите пароль">
        <button onclick="checkPassword()">Войти</button>
    </div>

    <!-- Админ-панель -->
    <div id="adminPanel" class="hidden">
        <div class="admin-header">
            <h1>🔥 ТЕРМОГРАД - Админ-панель</h1>
            <div>
                <button class="refresh-btn" onclick="loadOrders()">🔄 Обновить</button>
                <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
            </div>
        </div>

        <div class="stats" id="stats"></div>

        <div style="overflow-x: auto;">
            <table class="orders-table" id="ordersTable">
                <thead>
                    <tr><th>📅 Дата</th><th>👤 Имя</th><th>📧 Email</th><th>📞 Телефон</th><th>🏠 Адрес</th><th>📦 Заказ</th><th>💰 Итого</th></tr>
                </thead>
                <tbody id="ordersBody">
                    <tr><td colspan="7" class="loading">Загрузка заказов...</td></tr>
                </tbody>
            </table>
        </div>
        
        <a href="https://roman180808h-droid.github.io" class="back-link">← Вернуться на сайт</a>
    </div>
</div>

<script>
    // ========== ТВОЯ НОВАЯ ССЫЛКА НА APPS SCRIPT ==========
    const ORDERS_API_URL = "https://script.google.com/macros/s/AKfycbwqVOIveTdfiWE0TKH3BX98CkvELUsRWkSu2lk7ZUgMII4VM_Ak5rkmnmGhoZ4Xql6D/exec";
    const ADMIN_PASSWORD = "admin123";

    function checkPassword() {
        const pass = document.getElementById('password').value;
        if(pass === ADMIN_PASSWORD) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            loadOrders();
        } else {
            alert('Неверный пароль!');
        }
    }

    function logout() {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('password').value = '';
    }

    async function loadOrders() {
        const tbody = document.getElementById('ordersBody');
        const statsDiv = document.getElementById('stats');
        
        tbody.innerHTML = '<tr><td colspan="7" class="loading">Загрузка заказов...</td></tr>';
        
        try {
            const response = await fetch(ORDERS_API_URL);
            const orders = await response.json();
            
            if(orders && orders.length > 0) {
                // Сортируем от новых к старым
                orders.sort((a, b) => {
                    const dateA = new Date(a.Дата || '1970-01-01');
                    const dateB = new Date(b.Дата || '1970-01-01');
                    return dateB - dateA;
                });
                displayOrders(orders);
                calculateStats(orders);
            } else {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">Нет заказов</td></tr>';
                statsDiv.innerHTML = '<div class="stat-card"><h3>0</h3><p>Всего заказов</p></div><div class="stat-card"><h3>0 ₽</h3><p>Общая выручка</p></div>';
            }
        } catch(e) {
            console.error('Ошибка:', e);
            tbody.innerHTML = '<tr><td colspan="7" class="error">Ошибка загрузки заказов. Проверьте соединение.</td></tr>';
            statsDiv.innerHTML = '<div class="stat-card"><h3>❌</h3><p>Ошибка</p></div>';
        }
    }

    function displayOrders(orders) {
        const tbody = document.getElementById('ordersBody');
        let html = '';
        
        for(let order of orders) {
            html += `<tr>
                <td>${order.Дата || ''}</td>
                <td>${order.Имя || ''}</td>
                <td>${order.Email || ''}</td>
                <td>${order.Телефон || ''}</td>
                <td>${order.Адрес || ''}</td>
                <td style="max-width:300px;">${order.Заказ || ''}</td>
                <td style="color:#d97a2b; font-weight:bold;">${order.Итого || ''}</td>
            </tr>`;
        }
        
        tbody.innerHTML = html;
    }

    function calculateStats(orders) {
        const statsDiv = document.getElementById('stats');
        const totalOrders = orders.length;
        
        let totalSum = 0;
        for(let order of orders) {
            const sumStr = order.Итого || '0';
            const sumNum = parseInt(sumStr.replace(/[^\d]/g, ''));
            if(!isNaN(sumNum)) totalSum += sumNum;
        }
        
        statsDiv.innerHTML = `
            <div class="stat-card"><h3>${totalOrders}</h3><p>Всего заказов</p></div>
            <div class="stat-card"><h3>${totalSum.toLocaleString('ru-RU')} ₽</h3><p>Общая выручка</p></div>
        `;
    }
</script>
</body>
</html>
